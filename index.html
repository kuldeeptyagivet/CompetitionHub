    // ── Progress panel ──────────────────────────────────────────────────────

    function progressRender(container) {
      container.innerHTML = '';

      const attempts = JSON.parse(localStorage.getItem('ch_attempts') || '[]');
      const valid    = attempts.filter(a =>
        a.responses && a.responses.some(r => r.source_book)
      );

      if (valid.length === 0) {
        const msg = document.createElement('p');
        msg.textContent = 'No attempts recorded yet.';
        container.appendChild(msg);
        return;
      }

      // Collect unique books
      const books = new Set();
      valid.forEach(a => a.responses.forEach(r => { if (r.source_book) books.add(r.source_book); }));

      const filterArea = document.createElement('div');
      filterArea.className = 'progress-filters';

      // Books filter
      const bookGroup = document.createElement('div');
      bookGroup.className = 'progress-filter-group';
      const bookLbl = document.createElement('div');
      bookLbl.className   = 'filter-group-label';
      bookLbl.textContent = 'Books';
      bookGroup.appendChild(bookLbl);
      const bookList = document.createElement('div');
      bookList.className = 'progress-filter-list';
      [...books].sort().forEach(b => {
        const lbl = document.createElement('label');
        lbl.className = 'progress-filter-item';
        const cb = document.createElement('input');
        cb.type  = 'checkbox';
        cb.value = b;
        cb.addEventListener('change', () => progressUpdateChapters(bookList, chapterList, valid));
        lbl.appendChild(cb);
        lbl.appendChild(document.createTextNode(' ' + b));
        bookList.appendChild(lbl);
      });
      bookGroup.appendChild(bookList);
      filterArea.appendChild(bookGroup);

      // Chapters filter
      const chapterGroup = document.createElement('div');
      chapterGroup.className = 'progress-filter-group';
      const chapLbl = document.createElement('div');
      chapLbl.className   = 'filter-group-label';
      chapLbl.textContent = 'Chapters';
      chapterGroup.appendChild(chapLbl);
      const chapterList = document.createElement('div');
      chapterList.className = 'progress-filter-list';
      progressUpdateChapters(bookList, chapterList, valid);
      chapterGroup.appendChild(chapterList);
      filterArea.appendChild(chapterGroup);

      // Apply button
      const applyWrap = document.createElement('div');
      const btnApply  = document.createElement('button');
      btnApply.className   = 'btn-primary';
      btnApply.textContent = 'Apply';
      btnApply.addEventListener('click', () => {
        const selBooks    = [...bookList.querySelectorAll('input:checked')].map(cb => cb.value);
        const selChapKeys = [...chapterList.querySelectorAll('input:checked')].map(cb => cb.value);
        // If nothing checked, use all visible
        const chapKeys = selChapKeys.length > 0
          ? selChapKeys
          : [...chapterList.querySelectorAll('input')].map(cb => cb.value);
        progressApply(chapKeys, reportArea, valid);
      });
      applyWrap.appendChild(btnApply);
      filterArea.appendChild(applyWrap);

      container.appendChild(filterArea);

      const reportArea = document.createElement('div');
      reportArea.className = 'progress-report';
      container.appendChild(reportArea);
    }

    function progressUpdateChapters(bookList, chapterList, valid) {
      const selBooks = [...bookList.querySelectorAll('input:checked')].map(cb => cb.value);
      const chapMap  = new Map(); // key -> {book, chapter}
      valid.forEach(a => {
        a.responses.forEach(r => {
          if (!r.source_book || r.source_chapter === '' || r.source_chapter === undefined) return;
          if (selBooks.length > 0 && !selBooks.includes(r.source_book)) return;
          const key = `${r.source_book}::${r.source_chapter}`;
          if (!chapMap.has(key)) chapMap.set(key, { book: r.source_book, chapter: r.source_chapter });
        });
      });

      chapterList.innerHTML = '';
      [...chapMap.entries()]
        .sort((a, b) => {
          if (a[1].book !== b[1].book) return a[1].book.localeCompare(b[1].book);
          return Number(a[1].chapter) - Number(b[1].chapter);
        })
        .forEach(([key, { book, chapter }]) => {
          const lbl = document.createElement('label');
          lbl.className = 'progress-filter-item';
          const cb = document.createElement('input');
          cb.type  = 'checkbox';
          cb.value = key;
          lbl.appendChild(cb);
          lbl.appendChild(document.createTextNode(` Ch ${chapter} — ${book}`));
          chapterList.appendChild(lbl);
        });
    }

    function progressApply(chapKeys, reportArea, valid) {
      reportArea.innerHTML = '';

      const sorted = [...chapKeys].sort((a, b) => {
        const [bA, cA] = a.split('::');
        const [bB, cB] = b.split('::');
        if (bA !== bB) return bA.localeCompare(bB);
        return Number(cA) - Number(cB);
      });

      sorted.forEach(key => {
        const [book, chapterStr] = key.split('::');
        const chapter = chapterStr;

        const relevant = valid.filter(a =>
          a.responses.some(r => r.source_book === book && String(r.source_chapter) === String(chapter))
        );

        const card = document.createElement('div');
        card.className = 'progress-chapter-card';

        const hdr = document.createElement('div');
        hdr.className   = 'progress-chapter-header';
        hdr.textContent = `Chapter ${chapter} — ${book}`;
        card.appendChild(hdr);

        if (relevant.length === 0) {
          const none = document.createElement('p');
          none.textContent = 'No attempts yet for this chapter.';
          none.style.cssText = 'font-family:"DM Sans",sans-serif;font-size:0.875rem;color:var(--muted);margin:0;';
          card.appendChild(none);
        } else {
          let totalQ = 0, totalCorrect = 0, lastDate = '';

          const attemptList = document.createElement('div');
          attemptList.className    = 'progress-attempt-list';
          attemptList.style.display = 'none';

          relevant.forEach(attempt => {
            const chResp = attempt.responses.filter(r =>
              r.source_book === book && String(r.source_chapter) === String(chapter)
            );
            const cCorrect     = chResp.filter(r => r.marks_awarded > 0).length;
            const cIncorrect   = chResp.filter(r => r.marks_awarded < 0).length;
            const cUnattempted = chResp.filter(r => {
              const a = r.your_answer;
              return !a || (Array.isArray(a) ? a.length === 0 : a === '');
            }).length;

            totalQ       += chResp.length;
            totalCorrect += cCorrect;
            if (!lastDate || attempt.attemptedAt > lastDate) lastDate = attempt.attemptedAt;

            const row = document.createElement('div');
            row.className = 'progress-attempt-row';

            const info = document.createElement('div');
            info.className = 'history-info';

            const t = document.createElement('div');
            t.className   = 'history-title';
            t.style.fontSize = '0.875rem';
            t.textContent = attempt.title || 'Untitled Test';
            info.appendChild(t);

            const m = document.createElement('div');
            m.className   = 'history-meta';
            m.textContent = `${attempt.date} · ${chResp.length} Qs · ${cCorrect}✓ ${cIncorrect}✗ ${cUnattempted}—`;
            info.appendChild(m);

            row.appendChild(info);

            const btnView = document.createElement('button');
            btnView.className   = 'btn-secondary';
            btnView.textContent = 'View Result';
            btnView.style.cssText = 'font-size:0.8rem;padding:0.35rem 0.75rem;flex-shrink:0;';
            btnView.addEventListener('click', () => cbtViewAttempt(attempt));
            row.appendChild(btnView);

            attemptList.appendChild(row);
          });

          const accuracy = totalQ > 0 ? Math.round((totalCorrect / totalQ) * 100) : 0;
          const lastStr  = lastDate ? new Date(lastDate).toLocaleDateString('en-IN') : '—';

          const summary = document.createElement('div');
          summary.className   = 'progress-chapter-summary';
          summary.textContent = `${totalQ} questions attempted · ${accuracy}% accuracy · Last: ${lastStr}`;
          card.appendChild(summary);

          const btnRow = document.createElement('div');
          btnRow.className = 'progress-card-btns';

          const toggleBtn = document.createElement('button');
          toggleBtn.className   = 'progress-collapsible-btn';
          toggleBtn.textContent = `Show ${relevant.length} attempt${relevant.length !== 1 ? 's' : ''}`;
          toggleBtn.addEventListener('click', () => {
            const hidden = attemptList.style.display === 'none';
            attemptList.style.display = hidden ? 'flex' : 'none';
            toggleBtn.textContent = hidden
              ? 'Hide attempts'
              : `Show ${relevant.length} attempt${relevant.length !== 1 ? 's' : ''}`;
          });
          btnRow.appendChild(toggleBtn);

          const qaBtn = document.createElement('button');
          qaBtn.className   = 'progress-collapsible-btn';
          qaBtn.textContent = 'Question Analysis';
          let qaPanel = null;
          let qaBuilt = false;
          qaBtn.addEventListener('click', () => {
            if (!qaBuilt) {
              qaPanel = progressBuildQAnalysis(book, chapter, valid, card);
              qaBuilt = true;
            }
            const hidden = qaPanel.style.display === 'none';
            qaPanel.style.display = hidden ? 'block' : 'none';
            qaBtn.textContent = hidden ? 'Hide Analysis' : 'Question Analysis';
          });
          btnRow.appendChild(qaBtn);

          card.appendChild(btnRow);
          card.appendChild(attemptList);
        }

        reportArea.appendChild(card);
      });
    }

    function findQuestionById(qId) {
      const papers = JSON.parse(localStorage.getItem('ch_papers') || '[]');
      for (const p of papers) {
        if (!p.questions) continue;
        const q = p.questions.find(q => q.question_id === qId);
        if (q) return q;
      }
      return null;
    }

    function progressBuildQAnalysis(book, chapter, valid, card) {
      const panel = document.createElement('div');
      panel.className    = 'qa-panel';
      panel.style.display = 'none';

      // Collect all responses for this book+chapter across all valid attempts
      const allResps = [];
      valid.forEach(attempt => {
        attempt.responses.forEach(r => {
          if (r.source_book === book &&
              String(r.source_chapter) === String(chapter) &&
              r.question_id) {
            allResps.push({
              ...r,
              attemptedAt:  attempt.attemptedAt,
              attemptTitle: attempt.title || 'Untitled Test',
              attemptDate:  attempt.date
            });
          }
        });
      });

      if (allResps.length === 0) {
        const msg = document.createElement('p');
        msg.textContent = 'No question data available for this chapter.';
        msg.style.cssText = 'font-family:"DM Sans",sans-serif;font-size:0.875rem;color:var(--muted);';
        panel.appendChild(msg);
        card.appendChild(panel);
        return panel;
      }

      // Group by question_id, compute failure rates
      const byQId = new Map();
      allResps.forEach(r => {
        if (!byQId.has(r.question_id)) byQId.set(r.question_id, []);
        byQId.get(r.question_id).push(r);
      });

      const qStats = [...byQId.entries()].map(([qId, resps]) => {
        const total       = resps.length;
        const unsuccessful = resps.filter(r => !(r.marks_awarded > 0)).length;
        const failureRate  = total > 0 ? Math.round((unsuccessful / total) * 100) : 0;
        const q            = findQuestionById(qId);
        return { qId, resps, total, unsuccessful, failureRate, q };
      }).sort((a, b) => b.failureRate - a.failureRate);

      // Threshold row
      const threshRow = document.createElement('div');
      threshRow.className = 'qa-threshold-row';
      const threshLbl = document.createElement('span');
      threshLbl.textContent = 'Select questions with failure rate above';
      const threshInput = document.createElement('input');
      threshInput.type      = 'number';
      threshInput.min       = '0';
      threshInput.max       = '100';
      threshInput.value     = '50';
      threshInput.className = 'param-input';
      threshInput.style.width = '4rem';
      const pctSpan = document.createElement('span');
      pctSpan.textContent = '%';
      const btnThresh = document.createElement('button');
      btnThresh.className   = 'btn-secondary';
      btnThresh.textContent = 'Apply';
      btnThresh.style.cssText = 'font-size:0.8rem;padding:0.35rem 0.75rem;';
      threshRow.appendChild(threshLbl);
      threshRow.appendChild(threshInput);
      threshRow.appendChild(pctSpan);
      threshRow.appendChild(btnThresh);
      panel.appendChild(threshRow);

      // Question list
      const qList = document.createElement('div');
      qList.className = 'qa-list';
      const checkboxes = [];

      qStats.forEach(({ qId, resps, total, unsuccessful, failureRate, q }) => {
        const row = document.createElement('div');
        row.className = 'qa-row';

        const cb = document.createElement('input');
        cb.type      = 'checkbox';
        cb.className = 'qa-cb';
        checkboxes.push(cb);
        cb.addEventListener('change', updateBtn);

        const content = document.createElement('div');
        content.className = 'qa-content';

        const stemText = q ? (q.stem || q.assertion || qId) : qId;
        const stemEl = document.createElement('div');
        stemEl.className   = 'qa-stem';
        stemEl.textContent = stemText;

        const stats = document.createElement('div');
        stats.className   = 'qa-stats';
        stats.textContent = `${total} attempt${total !== 1 ? 's' : ''} · ${unsuccessful} unsuccessful · ${failureRate}% failure rate`;

        const detail = document.createElement('div');
        detail.className    = 'qa-detail';
        detail.style.display = 'none';

        [...resps].sort((a, b) => b.attemptedAt.localeCompare(a.attemptedAt)).forEach(r => {
          const dRow = document.createElement('div');
          dRow.className = 'qa-detail-row';
          const ansStr = Array.isArray(r.your_answer)
            ? r.your_answer.join(', ')
            : (r.your_answer || '—');
          const mCls = r.marks_awarded > 0
            ? 'cbt-result-correct'
            : r.marks_awarded < 0 ? 'cbt-result-incorrect' : '';
          const mStr = r.marks_awarded > 0 ? `+${r.marks_awarded}` : String(r.marks_awarded);
          dRow.innerHTML =
            `<span>${new Date(r.attemptedAt).toLocaleDateString('en-IN')} — ${r.attemptTitle}</span>` +
            `<span>Your: <strong>${ansStr}</strong></span>` +
            `<span>Correct: <strong>${r.correct_answer || '—'}</strong></span>` +
            `<span class="${mCls}">${mStr}</span>`;
          detail.appendChild(dRow);
        });

        stemEl.addEventListener('click', () => {
          const expanding = stemEl.classList.toggle('expanded');
          detail.style.display = expanding ? 'block' : 'none';
          if (expanding) renderMath(stemEl);
        });

        content.appendChild(stemEl);
        content.appendChild(stats);
        content.appendChild(detail);
        row.appendChild(cb);
        row.appendChild(content);
        qList.appendChild(row);
      });

      panel.appendChild(qList);

      // Generate Retest button
      const retestWrap = document.createElement('div');
      retestWrap.className = 'qa-retest-wrap';
      const btnRetest = document.createElement('button');
      btnRetest.className   = 'btn-primary';
      btnRetest.textContent = 'Generate Retest';
      btnRetest.disabled    = true;
      retestWrap.appendChild(btnRetest);
      panel.appendChild(retestWrap);

      function updateBtn() {
        btnRetest.disabled = !checkboxes.some(cb => cb.checked);
      }

      btnThresh.addEventListener('click', () => {
        const threshold = Number(threshInput.value);
        checkboxes.forEach((cb, i) => { cb.checked = qStats[i].failureRate > threshold; });
        updateBtn();
      });

      btnRetest.addEventListener('click', () => {
        const selectedStats = qStats.filter((_, i) => checkboxes[i] && checkboxes[i].checked);
        const selectedQs    = selectedStats.map(s => s.q).filter(Boolean);
        if (selectedQs.length === 0) return;

        let totalSec = 0;
        selectedQs.forEach(q => { totalSec += (q.avg_time_sec != null ? q.avg_time_sec : 90); });
        const totalMin    = Math.round(totalSec / 60);
        const hr          = Math.floor(totalMin / 60);
        const min         = totalMin % 60;
        const durationStr = hr === 0 ? min + ' min'
                          : min === 0 ? hr + ' hr'
                          : hr + ' hr ' + min + ' min';
        const N = selectedQs.length;

        paper = {
          id:        crypto.randomUUID(),
          generated: new Date().toISOString(),
          meta: {
            title:             `Retest — Chapter ${chapter} (${N} question${N !== 1 ? 's' : ''})`,
            date:              new Date().toLocaleDateString('en-IN'),
            duration:          durationStr,
            totalMarks:        parseFloat((N * paperParams.marksPerQ).toFixed(2)),
            marksPerQ:         paperParams.marksPerQ,
            negativeMarking:   paperParams.negativeMarking,
            negativeMarksPerQ: paperParams.negativeMarksPerQ
          },
          questions: selectedQs
        };

        paperSave();
        selectRender();
        switchTab('select');
      });

      card.appendChild(panel);
      renderMath(panel);
      return panel;
    }

    // ── CBT ─────────────────────────────────────────────────────────────────

    function parseDuration(str) {
      let secs = 0;
      const hrMatch  = str.match(/(\d+)\s*hr/);
      const minMatch = str.match(/(\d+)\s*min/);
      if (hrMatch)  secs += parseInt(hrMatch[1])  * 3600;
      if (minMatch) secs += parseInt(minMatch[1]) * 60;
      return secs || 3600;
    }

    function cbtFormatTime(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
    }

    function cbtClearTimer() {
      if (cbt && cbt.timerInterval) {
        clearInterval(cbt.timerInterval);
        cbt.timerInterval = null;
      }
    }

    function cbtStatusClass(status) {
      return {
        'not-visited':     'palette-not-visited',
        'visited':         'palette-visited',
        'answered':        'palette-answered',
        'review':          'palette-review',
        'answered-review': 'palette-answered-review'
      }[status] || 'palette-not-visited';
    }

    function cbtRender() {
      const tab = document.getElementById('tab-cbt');
      tab.innerHTML = '';

      if (!paper) {
        const msg = document.createElement('p');
        msg.textContent = 'Load a paper from History to begin a CBT attempt.';
        tab.appendChild(msg);
        return;
      }

      // Init fresh if no CBT or different paper
      if (!cbt || cbt.paperId !== paper.id) {
        cbt = {
          paperId:       paper.id,
          current:       0,
          answers:       {},
          status:        {},
          timerInterval: null,
          timeLeft:      parseDuration(paper.meta.duration)
        };
        paper.questions.forEach((_, i) => { cbt.status[i] = 'not-visited'; });
      }

      cbtRenderAttempt();
    }

    function cbtRenderAttempt() {
      const tab = document.getElementById('tab-cbt');
      tab.innerHTML = '';

      const container = document.createElement('div');
      container.className = 'cbt-container';

      // Header
      const header = document.createElement('div');
      header.className = 'cbt-header';

      const headerTitle = document.createElement('div');
      headerTitle.className   = 'cbt-header-title';
      headerTitle.textContent = paper.meta.title || 'CBT Attempt';

      const timerEl = document.createElement('div');
      timerEl.className = 'cbt-timer';
      timerEl.id        = 'cbt-timer-display';
      timerEl.textContent = cbtFormatTime(cbt.timeLeft);

      const btnSubmitHeader = document.createElement('button');
      btnSubmitHeader.className   = 'btn-primary';
      btnSubmitHeader.textContent = 'Submit';
      btnSubmitHeader.addEventListener('click', cbtShowConfirm);

      header.appendChild(headerTitle);
      header.appendChild(timerEl);
      header.appendChild(btnSubmitHeader);
      container.appendChild(header);

      // Body
      const body = document.createElement('div');
      body.className = 'cbt-body';

      const qArea = document.createElement('div');
      qArea.id        = 'cbt-question-area';
      qArea.className = 'cbt-question-area';

      const paletteArea = document.createElement('div');
      paletteArea.className = 'cbt-palette-area';

      const palTitle = document.createElement('div');
      palTitle.className   = 'cbt-palette-title';
      palTitle.textContent = 'Question Palette';
      paletteArea.appendChild(palTitle);

      const palGrid = document.createElement('div');
      palGrid.className = 'cbt-palette-grid';
      palGrid.id        = 'cbt-palette-grid';
      paletteArea.appendChild(palGrid);

      const legend = document.createElement('div');
      legend.className = 'cbt-legend';
      [
        { cls: 'palette-not-visited',     label: 'Not visited' },
        { cls: 'palette-visited',         label: 'Visited, not answered' },
        { cls: 'palette-answered',        label: 'Answered' },
        { cls: 'palette-review',          label: 'Marked for review' },
        { cls: 'palette-answered-review', label: 'Answered & marked' }
      ].forEach(({ cls, label }) => {
        const item = document.createElement('div');
        item.className = 'cbt-legend-item';
        const dot = document.createElement('div');
        dot.className = `cbt-legend-dot ${cls}`;
        const txt = document.createElement('span');
        txt.textContent = label;
        item.appendChild(dot);
        item.appendChild(txt);
        legend.appendChild(item);
      });
      paletteArea.appendChild(legend);

      body.appendChild(qArea);
      body.appendChild(paletteArea);
      container.appendChild(body);
      tab.appendChild(container);

      cbtRenderPalette();
      cbtRenderQuestion(cbt.current);

      // Start timer
      cbtClearTimer();
      cbt.timerInterval = setInterval(() => {
        if (!cbt) return;
        cbt.timeLeft = Math.max(0, cbt.timeLeft - 1);
        const el = document.getElementById('cbt-timer-display');
        if (el) {
          el.textContent = cbtFormatTime(cbt.timeLeft);
          if (cbt.timeLeft <= 300) el.classList.add('warning');
        }
        if (cbt.timeLeft <= 0) {
          cbtClearTimer();
          cbtShowResult();
        }
      }, 1000);
    }

    function cbtRenderPalette() {
      const grid = document.getElementById('cbt-palette-grid');
      if (!grid) return;
      grid.innerHTML = '';
      paper.questions.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.className   = 'palette-btn ' + cbtStatusClass(cbt.status[i]);
        btn.textContent = i + 1;
        if (i === cbt.current) btn.classList.add('palette-current');
        btn.addEventListener('click', () => cbtGoTo(i));
        grid.appendChild(btn);
      });
    }

    function cbtRenderQuestion(idx) {
      const area = document.getElementById('cbt-question-area');
      if (!area) return;
      area.innerHTML = '';

      const q = paper.questions[idx];
      if (!q) return;

      if (cbt.status[idx] === 'not-visited') cbt.status[idx] = 'visited';

      const ROMAN = ['i','ii','iii','iv','v','vi','vii','viii','ix','x'];
      const type  = q.type || 'mcq_single';

      // Meta row
      const meta = document.createElement('div');
      meta.className = 'cbt-q-meta';
      const numSpan = document.createElement('span');
      numSpan.className   = 'cbt-q-number';
      numSpan.textContent = `Question ${idx + 1} of ${paper.questions.length}`;
      const badge = document.createElement('span');
      badge.className   = 'select-q-badge';
      badge.textContent = type.replace(/_/g, ' ');
      meta.appendChild(numSpan);
      meta.appendChild(badge);
      area.appendChild(meta);

      // Question body by type
      if (type === 'assertion_reason') {
        const aLbl = document.createElement('div');
        aLbl.className   = 'cbt-q-label';
        aLbl.textContent = 'Assertion (A):';
        area.appendChild(aLbl);
        const aText = document.createElement('div');
        aText.className   = 'cbt-q-stem';
        aText.textContent = q.assertion || '';
        area.appendChild(aText);
        const rLbl = document.createElement('div');
        rLbl.className   = 'cbt-q-label';
        rLbl.textContent = 'Reason (R):';
        area.appendChild(rLbl);
        const rText = document.createElement('div');
        rText.className   = 'cbt-q-stem';
        rText.textContent = q.reason || '';
        area.appendChild(rText);
      } else if (type === 'match_following') {
        const table  = document.createElement('table');
        table.className = 'cbt-match-table';
        const thead  = document.createElement('thead');
        const hRow   = document.createElement('tr');
        ['List I', 'List II'].forEach(h => {
          const th = document.createElement('th');
          th.textContent = h;
          hRow.appendChild(th);
        });
        thead.appendChild(hRow);
        table.appendChild(thead);
        const tbody  = document.createElement('tbody');
        const listI  = q.list_i  || [];
        const listII = q.list_ii || [];
        const rc     = Math.max(listI.length, listII.length);
        for (let i = 0; i < rc; i++) {
          const tr  = document.createElement('tr');
          const tdI = document.createElement('td');
          tdI.textContent  = listI[i]  ? `${i + 1}. ${listI[i]}`     : '';
          const tdII = document.createElement('td');
          tdII.textContent = listII[i] ? `${ROMAN[i]}. ${listII[i]}` : '';
          tr.appendChild(tdI);
          tr.appendChild(tdII);
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        area.appendChild(table);
        const stemEl = document.createElement('div');
        stemEl.className   = 'cbt-q-stem';
        stemEl.textContent = q.stem || '';
        area.appendChild(stemEl);
      } else {
        const stemEl = document.createElement('div');
        stemEl.className   = 'cbt-q-stem';
        stemEl.textContent = q.stem || '';
        area.appendChild(stemEl);
      }

      // Options
      const isMulti = type === 'mcq_multi';
      let opts = q.options || [];
      if (type === 'assertion_reason') {
        opts = [
          { key: 'A', text: 'Both A and R are true and R is the correct explanation of A' },
          { key: 'B', text: 'Both A and R are true but R is not the correct explanation of A' },
          { key: 'C', text: 'A is true but R is false' },
          { key: 'D', text: 'A is false but R is true' }
        ];
      }

      const optionsDiv = document.createElement('div');
      optionsDiv.className = 'cbt-options';
      const currentAnswer = cbt.answers[idx];

      opts.forEach(opt => {
        const label = document.createElement('label');
        label.className = 'cbt-option';

        const input = document.createElement('input');
        input.type  = isMulti ? 'checkbox' : 'radio';
        input.name  = `cbt-q-${idx}`;
        input.value = opt.key;

        if (isMulti) {
          if (Array.isArray(currentAnswer) && currentAnswer.includes(opt.key)) {
            input.checked = true;
            label.classList.add('selected');
          }
        } else {
          if (currentAnswer === opt.key) {
            input.checked = true;
            label.classList.add('selected');
          }
        }

        input.addEventListener('change', () => {
          if (isMulti) {
            optionsDiv.querySelectorAll('.cbt-option').forEach(l => l.classList.remove('selected'));
            optionsDiv.querySelectorAll('input[type=checkbox]:checked').forEach(cb => {
              cb.closest('.cbt-option').classList.add('selected');
            });
          } else {
            optionsDiv.querySelectorAll('.cbt-option').forEach(l => l.classList.remove('selected'));
            label.classList.add('selected');
          }
        });

        const textSpan = document.createElement('span');
        textSpan.textContent = `${opt.key}. ${opt.text}`;
        label.appendChild(input);
        label.appendChild(textSpan);
        optionsDiv.appendChild(label);
      });

      area.appendChild(optionsDiv);

      // Controls
      const controls = document.createElement('div');
      controls.className = 'cbt-controls';

      const btnBack = document.createElement('button');
      btnBack.className   = 'cbt-nav-btn';
      btnBack.textContent = '← Back';
      btnBack.disabled    = idx === 0;
      btnBack.addEventListener('click', () => cbtGoTo(idx - 1));

      const btnSave = document.createElement('button');
      btnSave.className   = 'btn-primary';
      btnSave.textContent = 'Save & Next';
      btnSave.addEventListener('click', () => {
        const ans = cbtReadAnswer(idx, isMulti, optionsDiv);
        if (ans !== null) {
          cbt.answers[idx] = ans;
          if (cbt.status[idx] !== 'answered-review') cbt.status[idx] = 'answered';
        }
        if (idx + 1 < paper.questions.length) cbtGoTo(idx + 1);
      });

      const btnMark = document.createElement('button');
      btnMark.className   = 'btn-secondary';
      btnMark.textContent = 'Mark for Review';
      btnMark.addEventListener('click', () => {
        const ans = cbtReadAnswer(idx, isMulti, optionsDiv);
        if (ans !== null) {
          cbt.answers[idx] = ans;
          cbt.status[idx]  = 'answered-review';
        } else {
          cbt.status[idx] = 'review';
        }
        if (idx + 1 < paper.questions.length) cbtGoTo(idx + 1);
      });

      const btnClear = document.createElement('button');
      btnClear.className   = 'cbt-nav-btn';
      btnClear.textContent = 'Clear Response';
      btnClear.addEventListener('click', () => {
        delete cbt.answers[idx];
        cbt.status[idx] = 'visited';
        cbtRenderQuestion(idx);
        cbtRenderPalette();
      });

      const btnNext = document.createElement('button');
      btnNext.className   = 'cbt-nav-btn';
      btnNext.textContent = 'Next →';
      btnNext.disabled    = idx === paper.questions.length - 1;
      btnNext.addEventListener('click', () => cbtGoTo(idx + 1));

      controls.appendChild(btnBack);
      controls.appendChild(btnSave);
      controls.appendChild(btnMark);
      controls.appendChild(btnClear);
      controls.appendChild(btnNext);
      area.appendChild(controls);

      cbtRenderPalette();
      renderMath(area);
    }

    function cbtReadAnswer(idx, isMulti, optionsDiv) {
      if (isMulti) {
        const checked = [...optionsDiv.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
        return checked.length > 0 ? checked : null;
      }
      const checked = optionsDiv.querySelector('input[type=radio]:checked');
      return checked ? checked.value : null;
    }

    function cbtGoTo(idx) {
      if (idx < 0 || idx >= paper.questions.length) return;
      cbt.current = idx;
      cbtRenderQuestion(idx);
      cbtRenderPalette();
    }

    function cbtShowConfirm() {
      cbtClearTimer();
      const tab = document.getElementById('tab-cbt');
      tab.innerHTML = '';

      const answered    = Object.values(cbt.status).filter(s => s === 'answered' || s === 'answered-review').length;
      const notAnswered = paper.questions.length - answered;
      const review      = Object.values(cbt.status).filter(s => s === 'review'   || s === 'answered-review').length;

      const box = document.createElement('div');
      box.className = 'cbt-result';

      const title = document.createElement('div');
      title.className   = 'cbt-result-header';
      title.textContent = 'Submit Test?';
      box.appendChild(title);

      const summary = document.createElement('div');
      summary.className = 'cbt-result-summary';
      [
        { val: answered,    label: 'Answered' },
        { val: notAnswered, label: 'Not answered' },
        { val: review,      label: 'Marked for review' }
      ].forEach(({ val, label }) => {
        const card  = document.createElement('div');
        card.className  = 'cbt-result-card';
        const v = document.createElement('div');
        v.className   = 'cbt-result-card-val';
        v.textContent = val;
        const l = document.createElement('div');
        l.className   = 'cbt-result-card-label';
        l.textContent = label;
        card.appendChild(v);
        card.appendChild(l);
        summary.appendChild(card);
      });
      box.appendChild(summary);

      const btns = document.createElement('div');
      btns.style.cssText = 'display:flex;gap:0.75rem;';

      const btnCancel = document.createElement('button');
      btnCancel.className   = 'btn-secondary';
      btnCancel.textContent = 'Cancel';
      btnCancel.addEventListener('click', () => {
        cbtRenderAttempt();
        // Restore timer from remaining time (already in cbt.timeLeft)
        cbtGoTo(cbt.current);
      });

      const btnConfirm = document.createElement('button');
      btnConfirm.className   = 'btn-primary';
      btnConfirm.textContent = 'Submit';
      btnConfirm.addEventListener('click', cbtShowResult);

      btns.appendChild(btnCancel);
      btns.appendChild(btnConfirm);
      box.appendChild(btns);
      tab.appendChild(box);
    }

    function cbtShowResult() {
      cbtClearTimer();
      const tab = document.getElementById('tab-cbt');
      tab.innerHTML = '';

      const m          = paper.meta;
      const marksPerQ  = m.marksPerQ         || 1;
      const negMarking = m.negativeMarking   || false;
      const negMarks   = m.negativeMarksPerQ || 0;

      let correct = 0, incorrect = 0, unattempted = 0, totalScore = 0;

      const breakdown = paper.questions.map((q, i) => {
        const userAns = cbt.answers[i];
        const hasAns  = userAns !== null && userAns !== undefined &&
                        (Array.isArray(userAns) ? userAns.length > 0 : userAns !== '');
        if (!hasAns) {
          unattempted++;
          return { q, i, userAns: null, marks: 0, result: 'unattempted' };
        }
        const correctAns = (q.correct || '').trim();
        let isCorrect = false;
        if (Array.isArray(userAns)) {
          isCorrect = [...userAns].sort().join('') === correctAns.split('').sort().join('');
        } else {
          isCorrect = userAns === correctAns;
        }
        if (isCorrect) {
          correct++;
          totalScore += marksPerQ;
          return { q, i, userAns, marks: marksPerQ, result: 'correct' };
        } else {
          incorrect++;
          const lost = negMarking ? negMarks : 0;
          totalScore -= lost;
          return { q, i, userAns, marks: lost > 0 ? -lost : 0, result: 'incorrect' };
        }
      });

      // Save attempt to localStorage
      const attemptEntry = {
        attemptId:     crypto.randomUUID(),
        paperId:       paper.id,
        title:         paper.meta.title || 'Untitled Test',
        date:          paper.meta.date,
        attemptedAt:   new Date().toISOString(),
        score:         totalScore,
        correct,
        incorrect,
        unattempted,
        totalMarks:    paper.meta.totalMarks,
        questionCount: paper.questions.length,
        responses:     paper.questions.map((q, i) => {
          const bd = breakdown[i];
          return {
            question_id:    q.question_id || '',
            your_answer:    Array.isArray(bd.userAns) ? bd.userAns : (bd.userAns || ''),
            correct_answer: q.correct || '',
            marks_awarded:  bd.marks,
            source_book:    (q.source && q.source.book)    || '',
            source_chapter: (q.source && q.source.chapter) || ''
          };
        })
      };
      const existingAttempts = JSON.parse(localStorage.getItem('ch_attempts') || '[]');
      existingAttempts.push(attemptEntry);
      localStorage.setItem('ch_attempts', JSON.stringify(existingAttempts));
      workerPost('save-attempt', attemptEntry);

      const container = document.createElement('div');
      container.className = 'cbt-result';

      const title = document.createElement('div');
      title.className   = 'cbt-result-header';
      title.textContent = 'Result';
      container.appendChild(title);

      const summary = document.createElement('div');
      summary.className = 'cbt-result-summary';
      [
        { val: totalScore.toFixed(2), label: 'Score' },
        { val: correct,               label: 'Correct' },
        { val: incorrect,             label: 'Incorrect' },
        { val: unattempted,           label: 'Unattempted' }
      ].forEach(({ val, label }) => {
        const card = document.createElement('div');
        card.className  = 'cbt-result-card';
        const v = document.createElement('div');
        v.className   = 'cbt-result-card-val';
        v.textContent = val;
        const l = document.createElement('div');
        l.className   = 'cbt-result-card-label';
        l.textContent = label;
        card.appendChild(v);
        card.appendChild(l);
        summary.appendChild(card);
      });
      container.appendChild(summary);

      const bk = document.createElement('div');
      bk.className = 'cbt-breakdown';

      const hRow = document.createElement('div');
      hRow.className = 'cbt-breakdown-row header';
      ['#', 'Question', 'Your Answer', 'Correct', 'Marks'].forEach(h => {
        const d = document.createElement('div');
        d.textContent = h;
        hRow.appendChild(d);
      });
      bk.appendChild(hRow);

      const ROMAN_BK = ['i','ii','iii','iv','v','vi','vii','viii','ix','x'];

      breakdown.forEach(({ q, i, userAns, marks, result }) => {
        const row = document.createElement('div');
        row.className = 'cbt-breakdown-row';

        // Col 1: number
        const numD = document.createElement('div');
        numD.textContent = i + 1;

        // Col 2: full question block
        const type = q.type || 'mcq_single';
        const questionBlock = document.createElement('div');
        questionBlock.style.cssText = 'display:flex;flex-direction:column;gap:0.35rem;';

        if (type === 'assertion_reason') {
          const aLbl = document.createElement('div');
          aLbl.className   = 'cbt-q-label';
          aLbl.textContent = 'Assertion (A):';
          questionBlock.appendChild(aLbl);
          const aText = document.createElement('div');
          aText.style.cssText = 'font-size:10.5pt;';
          aText.textContent = q.assertion || '';
          questionBlock.appendChild(aText);
          const rLbl = document.createElement('div');
          rLbl.className   = 'cbt-q-label';
          rLbl.textContent = 'Reason (R):';
          questionBlock.appendChild(rLbl);
          const rText = document.createElement('div');
          rText.style.cssText = 'font-size:10.5pt;';
          rText.textContent = q.reason || '';
          questionBlock.appendChild(rText);
        } else if (type === 'match_following') {
          const tbl  = document.createElement('table');
          tbl.className = 'cbt-match-table';
          const thead = document.createElement('thead');
          const hrow  = document.createElement('tr');
          ['List I', 'List II'].forEach(h => {
            const th = document.createElement('th');
            th.textContent = h;
            hrow.appendChild(th);
          });
          thead.appendChild(hrow);
          tbl.appendChild(thead);
          const tbody  = document.createElement('tbody');
          const listI  = q.list_i  || [];
          const listII = q.list_ii || [];
          const rc = Math.max(listI.length, listII.length);
          for (let r = 0; r < rc; r++) {
            const tr = document.createElement('tr');
            const tdI = document.createElement('td');
            tdI.textContent  = listI[r]  ? `${r + 1}. ${listI[r]}`       : '';
            const tdII = document.createElement('td');
            tdII.textContent = listII[r] ? `${ROMAN_BK[r]}. ${listII[r]}` : '';
            tr.appendChild(tdI);
            tr.appendChild(tdII);
            tbody.appendChild(tr);
          }
          tbl.appendChild(tbody);
          questionBlock.appendChild(tbl);
          const stemEl = document.createElement('div');
          stemEl.style.cssText = 'font-size:10.5pt;';
          stemEl.textContent = q.stem || '';
          questionBlock.appendChild(stemEl);
        } else {
          const stemEl = document.createElement('div');
          stemEl.style.cssText = 'font-size:10.5pt;';
          stemEl.textContent = q.stem || '';
          questionBlock.appendChild(stemEl);
        }

        // Options with highlighting
        let opts = q.options || [];
        if (type === 'assertion_reason') {
          opts = [
            { key: 'A', text: 'Both A and R are true and R is the correct explanation of A' },
            { key: 'B', text: 'Both A and R are true but R is not the correct explanation of A' },
            { key: 'C', text: 'A is true but R is false' },
            { key: 'D', text: 'A is false but R is true' }
          ];
        }

        const correctKeys = (q.correct || '').split('').filter(k => k.trim() && /[A-Z]/i.test(k));
        const userKeys    = Array.isArray(userAns) ? userAns : (userAns ? [userAns] : []);

        const optsDiv = document.createElement('div');
        optsDiv.style.cssText = 'display:flex;flex-direction:column;gap:0.2rem;margin-top:0.25rem;';
        opts.forEach(opt => {
          const optDiv = document.createElement('div');
          optDiv.className   = 'bk-opt';
          optDiv.textContent = `${opt.key}. ${opt.text}`;
          if (correctKeys.includes(opt.key)) {
            optDiv.classList.add('bk-opt-correct');
          } else if (userKeys.includes(opt.key) && result === 'incorrect') {
            optDiv.classList.add('bk-opt-wrong');
          }
          optsDiv.appendChild(optDiv);
        });
        questionBlock.appendChild(optsDiv);

        // Col 3: your answer
        const yourD = document.createElement('div');
        yourD.textContent = Array.isArray(userAns) ? userAns.join(', ') : (userAns || '—');
        if (result === 'correct')   yourD.className = 'cbt-result-correct';
        if (result === 'incorrect') yourD.className = 'cbt-result-incorrect';

        // Col 4: correct answer
        const corrD = document.createElement('div');
        corrD.textContent = q.correct || '—';

        // Col 5: marks
        const marksD = document.createElement('div');
        marksD.textContent = result === 'unattempted' ? '0' : (marks > 0 ? '+' + marks : marks);
        if (marks > 0) marksD.className = 'cbt-result-correct';
        if (marks < 0) marksD.className = 'cbt-result-incorrect';

        [numD, questionBlock, yourD, corrD, marksD].forEach(d => row.appendChild(d));
        bk.appendChild(row);
      });

      container.appendChild(bk);
      renderMath(bk);

      const btnBackHist = document.createElement('button');
      btnBackHist.className   = 'btn-secondary';
      btnBackHist.textContent = 'Back to History';
      btnBackHist.addEventListener('click', () => { switchTab('history'); historyRender(); });
      container.appendChild(btnBackHist);

      tab.appendChild(container);
      renderMath(container);
    }

    // ── OMR answer entry ────────────────────────────────────────────────────

    function omrRender() {
      const tab = document.getElementById('tab-cbt');
      tab.innerHTML = '';

      const wrap = document.createElement('div');
      wrap.className = 'omr-wrap';

      // Header
      const header = document.createElement('div');
      header.className = 'omr-header';

      const btnBack = document.createElement('button');
      btnBack.className   = 'btn-secondary';
      btnBack.textContent = 'Back';
      btnBack.addEventListener('click', () => { switchTab('history'); historyRender(); });

      const info = document.createElement('div');
      info.className = 'omr-header-info';
      const titleEl = document.createElement('div');
      titleEl.className   = 'omr-title';
      titleEl.textContent = paper.meta.title || 'Untitled Test';
      const metaEl = document.createElement('div');
      metaEl.className   = 'omr-meta';
      metaEl.textContent = `${paper.meta.date} · ${paper.meta.totalMarks} marks · ${paper.questions.length} questions`;
      info.appendChild(titleEl);
      info.appendChild(metaEl);

      header.appendChild(btnBack);
      header.appendChild(info);
      wrap.appendChild(header);

      // Question grid
      const grid = document.createElement('div');
      grid.className = 'omr-grid';

      paper.questions.forEach((q, i) => {
        const card = document.createElement('div');
        card.className = 'omr-card';
        card.id = `omr-card-${i}`;

        const qNum = document.createElement('div');
        qNum.className   = 'omr-qnum';
        qNum.textContent = `Q${i + 1}`;
        card.appendChild(qNum);

        const inputs = document.createElement('div');
        inputs.className = 'omr-inputs';

        const type     = q.type || 'mcq_single';
        const isMulti  = type === 'mcq_multi';
        const inputType = isMulti ? 'checkbox' : 'radio';
        const groupName = `omr-q-${i}`;

        let optKeys;
        if (type === 'statement_based') {
          optKeys = (q.options || []).map(o => o.key);
        } else {
          optKeys = ['A', 'B', 'C', 'D'];
        }

        optKeys.forEach(key => {
          const lbl = document.createElement('label');
          lbl.className = 'omr-opt';
          const inp = document.createElement('input');
          inp.type  = inputType;
          inp.name  = groupName;
          inp.value = key;
          inp.addEventListener('change', () => omrUpdateAnswer(i, type));
          lbl.appendChild(inp);
          lbl.appendChild(document.createTextNode(key));
          inputs.appendChild(lbl);
        });
        card.appendChild(inputs);

        const clearBtn = document.createElement('button');
        clearBtn.className   = 'omr-clear';
        clearBtn.textContent = 'Clear';
        clearBtn.addEventListener('click', () => {
          card.querySelectorAll(`input[name="${groupName}"]`).forEach(el => { el.checked = false; });
          delete cbt.answers[i];
          omrSyncSubmitBtn();
        });
        card.appendChild(clearBtn);

        grid.appendChild(card);
      });

      wrap.appendChild(grid);

      // Submit button
      const submitWrap = document.createElement('div');
      submitWrap.className = 'omr-submit-wrap';
      const submitBtn = document.createElement('button');
      submitBtn.className   = 'btn-primary';
      submitBtn.textContent = 'Submit';
      submitBtn.disabled    = true;
      submitBtn.id          = 'omr-submit-btn';
      submitBtn.addEventListener('click', omrShowConfirm);
      submitWrap.appendChild(submitBtn);
      wrap.appendChild(submitWrap);

      tab.appendChild(wrap);

      // Restore any previously entered answers
      omrRestoreAnswers();
    }

    function omrUpdateAnswer(i, type) {
      const card    = document.getElementById(`omr-card-${i}`);
      const checked = [...card.querySelectorAll(`input[name="omr-q-${i}"]:checked`)].map(el => el.value);
      if (type === 'mcq_multi') {
        if (checked.length > 0) { cbt.answers[i] = checked; } else { delete cbt.answers[i]; }
      } else {
        if (checked.length > 0) { cbt.answers[i] = checked[0]; } else { delete cbt.answers[i]; }
      }
      omrSyncSubmitBtn();
    }

    function omrSyncSubmitBtn() {
      const btn = document.getElementById('omr-submit-btn');
      if (!btn) return;
      const hasAny = Object.values(cbt.answers).some(a =>
        a !== null && a !== undefined && (Array.isArray(a) ? a.length > 0 : a !== '')
      );
      btn.disabled = !hasAny;
    }

    function omrRestoreAnswers() {
      paper.questions.forEach((q, i) => {
        const ans = cbt.answers[i];
        if (!ans) return;
        const keys = Array.isArray(ans) ? ans : [ans];
        keys.forEach(key => {
          const inp = document.querySelector(`input[name="omr-q-${i}"][value="${key}"]`);
          if (inp) inp.checked = true;
        });
      });
      omrSyncSubmitBtn();
    }

    function omrShowConfirm() {
      const answered   = Object.values(cbt.answers).filter(a =>
        a !== null && a !== undefined && (Array.isArray(a) ? a.length > 0 : a !== '')
      ).length;
      const unanswered = paper.questions.length - answered;

      const tab = document.getElementById('tab-cbt');
      tab.innerHTML = '';

      const box = document.createElement('div');
      box.className = 'cbt-result';

      const titleEl = document.createElement('div');
      titleEl.className   = 'cbt-result-header';
      titleEl.textContent = 'Submit OMR?';
      box.appendChild(titleEl);

      const summary = document.createElement('div');
      summary.className = 'cbt-result-summary';
      [
        { val: answered,   label: 'Answered' },
        { val: unanswered, label: 'Unanswered' }
      ].forEach(({ val, label }) => {
        const card = document.createElement('div');
        card.className = 'cbt-result-card';
        const v = document.createElement('div');
        v.className   = 'cbt-result-card-val';
        v.textContent = val;
        const l = document.createElement('div');
        l.className   = 'cbt-result-card-label';
        l.textContent = label;
        card.appendChild(v);
        card.appendChild(l);
        summary.appendChild(card);
      });
      box.appendChild(summary);

      const btns = document.createElement('div');
      btns.style.cssText = 'display:flex;gap:0.75rem;';

      const btnCancel = document.createElement('button');
      btnCancel.className   = 'btn-secondary';
      btnCancel.textContent = 'Cancel';
      btnCancel.addEventListener('click', omrRender);

      const btnConfirm = document.createElement('button');
      btnConfirm.className   = 'btn-primary';
      btnConfirm.textContent = 'Submit';
      btnConfirm.addEventListener('click', cbtShowResult);

      btns.appendChild(btnCancel);

    // ── Shared fetch helper ──────────────────────────────────────────────────
    async function adminFetch(path, options = {}) {
      const method = options.method || 'GET';
      const hasBody = options.body !== undefined;
      try {
        const res = await fetch(`${CONFIG.workerUrl}/${path}`, {
          method,
          headers: {
            'x-access-key': CONFIG.accessKey,
            'x-user-email': authState.email,
            'Content-Type': 'application/json',
          },
          body: hasBody ? JSON.stringify(options.body) : undefined,
        });
        if (!res.ok) return null;
        return await res.json();
      } catch {
        return null;
      }
    }

    // ── Announcement banner ──────────────────────────────────────────────────
    async function announcementBannerInit() {
      const dismissed = JSON.parse(localStorage.getItem('ch_dismissed_ann') || '[]');
      const data = await adminFetch('announcements');
      if (!Array.isArray(data) || !data.length) return;
      const active = data.filter(a => !dismissed.includes(a.id));
      if (!active.length) return;
      const a = active[0];
      const banner = document.getElementById('announcement-banner');
      const span = document.createElement('span');
      span.textContent = a.message;
      const btn = document.createElement('button');
      btn.textContent = '✕';
      btn.setAttribute('aria-label', 'Dismiss');
      btn.addEventListener('click', () => {
        dismissed.push(a.id);
        localStorage.setItem('ch_dismissed_ann', JSON.stringify(dismissed));
        banner.style.display = 'none';
      });
      banner.innerHTML = '';
      banner.appendChild(span);
      banner.appendChild(btn);
      banner.style.display = 'flex';
    }

    // ── Unread-message badge ─────────────────────────────────────────────────
    let _adminBadgeTimer = null;

    async function adminBadgeRefresh() {
      const role = authState.role;
      if (role !== 'superadmin' && role !== 'admin') return;
      const data = await adminFetch('admin/messages');
      const badge = document.getElementById('admin-tab-badge');
      if (!badge) return;
      if (!Array.isArray(data)) { badge.style.display = 'none'; return; }
      const unread = data.filter(m => m.is_read === 0).length;
      if (unread > 0) {
        badge.textContent = unread;
        badge.style.display = 'inline-flex';
      } else {
        badge.style.display = 'none';
      }
    }

    function adminBadgeInit() {
      adminBadgeRefresh();
      if (_adminBadgeTimer) clearInterval(_adminBadgeTimer);
      _adminBadgeTimer = setInterval(adminBadgeRefresh, 60000);
    }

    function adminTabInit() {
      const role = authState.role;
      if (role !== 'superadmin' && role !== 'admin') return;
      const btn = document.getElementById('tab-btn-admin');

      announcementBannerInit();
      adminBadgeInit();

          ).join('')}
        </nav>

          <div class="admin-form" style="flex-direction:column;align-items:flex-start">
            <div class="admin-form-field" style="width:100%">
              <span class="admin-form-label">Message</span>
              <textarea class="admin-textarea" id="ann-msg" rows="3" placeholder="Announcement text…"></textarea>
            </div>
            <div class="admin-form" style="margin-top:0.5rem">
              <div class="admin-form-field">
                <span class="admin-form-label">Target Plan</span>
                <select class="admin-select" id="ann-plan">${planOpts}</select>
              </div>
              <div class="admin-form-field">
                <span class="admin-form-label">Expires (optional)</span>
                <input type="date" class="admin-input" id="ann-expires">
              </div>
              <button class="admin-btn admin-btn--primary" id="ann-submit">Post</button>
            </div>
          </div>
          <div id="ann-create-msg" style="font-size:0.8rem;display:none;margin-top:0.5rem"></div>
        </div>

        <div class="admin-card">
          <div class="admin-card-title">Active Announcements</div>
          <div id="ann-list">${annListHtml}</div>
        </div>
      `;

      document.getElementById('ann-submit').addEventListener('click', async () => {
        const body = {
          message:     document.getElementById('ann-msg').value.trim(),
          target_plan: document.getElementById('ann-plan').value,
          expires_at:  document.getElementById('ann-expires').value || null,
        };
        if (!body.message) return;
        const res = await adminFetch('admin/announcements/create', { method: 'POST', body });
        const msg = document.getElementById('ann-create-msg');
        msg.style.display = 'block';
        if (res) { msg.style.color = 'var(--success)'; msg.textContent = 'Announcement posted.'; setTimeout(() => adminRenderAnnouncements(), 700); }
        else     { msg.style.color = 'var(--warn)';    msg.textContent = 'Failed to post.'; }
      });

      document.querySelectorAll('[data-action="del-ann"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const res = await adminFetch(`admin/announcements/${encodeURIComponent(id)}`, { method: 'DELETE' });
          if (res) setTimeout(() => adminRenderAnnouncements(), 400);
        });
      });
    }

    // ── Messages sub-panel ───────────────────────────────────────────────────
    async function adminRenderMessages() {
      const content = document.getElementById('admin-content');
      const msgs    = await adminFetch('admin/messages');
      if (!content) return;

      const msgList = Array.isArray(msgs) ? msgs : [];
      const isSuperadmin = authState.role === 'superadmin';
      const defaultTo = isSuperadmin ? '' : 'drtyagivet@gmail.com';

      const inboxHtml = msgList.length
        ? msgList.map(m => `
          <div class="admin-msg-item${m.is_read === 0 ? ' unread' : ''}" data-action="read-msg" data-id="${m.id}" data-thread="${m.thread_id || m.id}" data-from="${m.from_email}">
            <div class="admin-msg-from">From: ${m.from_email}</div>
            <div class="admin-msg-subj">${m.subject}</div>
            <div class="admin-msg-body">${m.body}</div>
            <div class="admin-msg-time">${m.created_at}</div>
            <div style="margin-top:0.35rem">
              <button class="admin-btn admin-btn--ghost" style="font-size:0.72rem;padding:0.2rem 0.5rem"
                data-action="reply-msg" data-thread="${m.thread_id || m.id}" data-to="${m.from_email}" data-subj="Re: ${m.subject}">Reply</button>
            </div>
          </div>
        `).join('')
        : '<div style="color:var(--muted);font-size:0.85rem">No messages.</div>';

      content.innerHTML = `
        <div class="admin-messages-grid">
          <div>
            <div class="admin-card-title">Inbox</div>
            <div id="admin-inbox">${inboxHtml}</div>
          </div>
          <div>
            <div class="admin-card-title">Compose</div>
            <div class="admin-card">
              <div class="admin-form" style="flex-direction:column;gap:0.5rem">
                <div class="admin-form-field" style="width:100%">
                  <span class="admin-form-label">To</span>
                  <input class="admin-input" id="compose-to" value="${defaultTo}" style="width:100%">
                </div>
                <div class="admin-form-field" style="width:100%">
                  <span class="admin-form-label">Subject</span>
                  <input class="admin-input" id="compose-subj" style="width:100%">
                </div>
                <div class="admin-form-field" style="width:100%">
                  <span class="admin-form-label">Body</span>
                  <textarea class="admin-textarea" id="compose-body" rows="5"></textarea>
                </div>
                <input type="hidden" id="compose-thread" value="">
                <button class="admin-btn admin-btn--primary" id="compose-send">Send</button>
                <div id="compose-msg" style="font-size:0.78rem;display:none"></div>
              </div>
            </div>
          </div>
        </div>
      `;

      // Mark as read on click
      document.querySelectorAll('[data-action="read-msg"]').forEach(el => {
        el.addEventListener('click', async () => {
          if (el.classList.contains('unread')) {
            await adminFetch('admin/messages/read', { method: 'POST', body: { id: el.dataset.id } });
            el.classList.remove('unread');
            adminBadgeRefresh();
          }
        });
      });

      // Pre-fill compose on reply
      document.querySelectorAll('[data-action="reply-msg"]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          document.getElementById('compose-to').value     = btn.dataset.to;
          document.getElementById('compose-subj').value   = btn.dataset.subj;
          document.getElementById('compose-thread').value = btn.dataset.thread;
          document.getElementById('compose-body').focus();
        });
      });

      // Send / reply
      document.getElementById('compose-send').addEventListener('click', async () => {
        const to      = document.getElementById('compose-to').value.trim();
        const subject = document.getElementById('compose-subj').value.trim();
        const body    = document.getElementById('compose-body').value.trim();
        const thread  = document.getElementById('compose-thread').value.trim();
        if (!to || !subject || !body) return;

        const endpoint = thread ? 'admin/messages/reply' : 'admin/messages/send';
        const payload  = thread
          ? { thread_id: thread, to_email: to, subject, body }
          : { to_email: to, subject, body };

        const res = await adminFetch(endpoint, { method: 'POST', body: payload });
        const msg = document.getElementById('compose-msg');
        msg.style.display = 'block';
        if (res) {
          msg.style.color = 'var(--success)'; msg.textContent = 'Sent.';
          document.getElementById('compose-body').value   = '';
          document.getElementById('compose-thread').value = '';
          document.getElementById('compose-subj').value   = '';
          setTimeout(() => adminRenderMessages(), 800);
        } else {
          msg.style.color = 'var(--warn)'; msg.textContent = 'Failed to send.';
        }
      });
    }

    // ── Sync to R2 sub-panel ─────────────────────────────────────────────────
    async function adminRenderSync() {
      if (authState.role !== 'superadmin') return;
      const content = document.getElementById('admin-content');
      if (!content) return;
      content.innerHTML = '';

      let syncFolder  = null;
      let pendingFiles = [];   // [{filePath, content, hash}]
      let manifest    = {};

      // ── SHA-256 hex helper ──
      async function sha256hex(text) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
      }

      // ── Recursively collect all .json files ──
      async function collectJsonFiles(dirHandle, prefix) {
        const files = [];
        for await (const [name, handle] of dirHandle) {
          const relPath = prefix ? `${prefix}/${name}` : name;
          if (handle.kind === 'file' && name.endsWith('.json')) {
            files.push({ relPath, handle });
          } else if (handle.kind === 'directory') {
            files.push(...await collectJsonFiles(handle, relPath));
          }
        }
        return files;
      }

      // ── Build UI ──
      const card = document.createElement('div');
      card.className = 'admin-card';

      const title = document.createElement('div');
      title.className = 'admin-card-title';
      title.textContent = 'Sync to R2';
      card.appendChild(title);

      // Folder row
      const folderRow = document.createElement('div');
      folderRow.style.cssText = 'display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem';
      const pickBtn = document.createElement('button');
      pickBtn.className = 'admin-btn admin-btn--primary';
      pickBtn.textContent = 'Select Folder';
      const folderStatus = document.createElement('span');
      folderStatus.style.cssText = 'font-size:0.85rem;color:var(--muted)';
      folderStatus.textContent = 'No folder selected';
      folderRow.appendChild(pickBtn);
      folderRow.appendChild(folderStatus);
      card.appendChild(folderRow);

      // Scan button
      const scanBtn = document.createElement('button');
      scanBtn.className = 'admin-btn admin-btn--primary';
      scanBtn.textContent = 'Scan & Compare';
      scanBtn.style.display = 'none';
      card.appendChild(scanBtn);

      // Summary
      const summary = document.createElement('div');
      summary.style.cssText = 'font-size:0.85rem;color:var(--ink);margin-top:0.5rem;display:none';
      card.appendChild(summary);

      // Upload button
      const uploadBtn = document.createElement('button');
      uploadBtn.className = 'admin-btn admin-btn--primary';
      uploadBtn.textContent = 'Upload Changes';
      uploadBtn.style.cssText = 'display:none;margin-top:0.5rem';
      card.appendChild(uploadBtn);

      // Progress
      const progressWrap = document.createElement('div');
      progressWrap.style.cssText = 'display:none;margin-top:0.5rem';
      const progressText = document.createElement('div');
      progressText.style.cssText = 'font-size:0.85rem;color:var(--muted);margin-bottom:4px';
      const progressTrack = document.createElement('div');
      progressTrack.style.cssText = 'height:6px;background:var(--border);border-radius:3px;overflow:hidden';
      const progressFill = document.createElement('div');
      progressFill.style.cssText = 'height:100%;background:var(--accent);width:0%;transition:width 0.15s';
      progressTrack.appendChild(progressFill);
      progressWrap.appendChild(progressText);
      progressWrap.appendChild(progressTrack);
      card.appendChild(progressWrap);

      // Completion message
      const completionMsg = document.createElement('div');
      completionMsg.style.cssText = 'font-size:0.85rem;color:var(--success);margin-top:0.5rem;display:none';
      card.appendChild(completionMsg);

      // Error list
      const errorList = document.createElement('div');
      errorList.style.cssText = 'margin-top:0.5rem';
      card.appendChild(errorList);

      content.appendChild(card);

      // ── Folder picker ──
      pickBtn.addEventListener('click', async () => {
        try {
          syncFolder = await window.showDirectoryPicker();
          folderStatus.textContent = syncFolder.name;
          scanBtn.style.display = '';
          summary.style.display = 'none';
          uploadBtn.style.display = 'none';
          progressWrap.style.display = 'none';
          completionMsg.style.display = 'none';
          errorList.innerHTML = '';
          pendingFiles = [];
        } catch { /* user cancelled */ }
      });

      // ── Scan & Compare ──
      scanBtn.addEventListener('click', async () => {
        if (!syncFolder) return;
        scanBtn.disabled = true;
        scanBtn.textContent = 'Scanning…';
        summary.style.display = 'none';
        uploadBtn.style.display = 'none';
        completionMsg.style.display = 'none';
        errorList.innerHTML = '';
        pendingFiles = [];

        manifest = await adminFetch('admin/sync-manifest') || {};

        const allFiles = await collectJsonFiles(syncFolder, '');
        let unchanged = 0;

        for (const { relPath, handle } of allFiles) {
          const file = await handle.getFile();
          const text = await file.text();
          const hash = await sha256hex(text);
          if (manifest[relPath] === hash) {
            unchanged++;
          } else {
            pendingFiles.push({ filePath: relPath, content: text, hash });
          }
        }

        const newCount = pendingFiles.filter(f => !(f.filePath in manifest)).length;
        const modCount = pendingFiles.length - newCount;
        summary.textContent = `${unchanged} files unchanged, ${newCount} new, ${modCount} modified`;
        summary.style.display = '';

        if (pendingFiles.length > 0) uploadBtn.style.display = '';

        scanBtn.disabled = false;
        scanBtn.textContent = 'Scan & Compare';
      });

      // ── Upload Changes ──
      uploadBtn.addEventListener('click', async () => {
        if (!pendingFiles.length) return;
        uploadBtn.style.display = 'none';
        scanBtn.disabled = true;
        pickBtn.disabled = true;
        progressWrap.style.display = '';
        completionMsg.style.display = 'none';
        errorList.innerHTML = '';

        const total = pendingFiles.length;
        let uploaded = 0;
        const errors = [];
        const updatedManifest = { ...manifest };

        const BATCH = 5;
        for (let i = 0; i < total; i += BATCH) {
          const batch = pendingFiles.slice(i, i + BATCH);
          await Promise.all(batch.map(async ({ filePath, content, hash }) => {
            try {
              const res = await adminFetch('admin/sync-file', {
                method: 'POST',
                body: { filePath, content }
              });
              if (res && res.written) {
                updatedManifest[filePath] = hash;
              } else {
                errors.push(filePath);
              }
            } catch {
              errors.push(filePath);
            }
            uploaded++;
            progressText.textContent = `Uploaded ${uploaded} of ${total} files`;
            progressFill.style.width = `${Math.round(uploaded / total * 100)}%`;
          }));
        }

        await adminFetch('admin/sync-manifest', {
          method: 'POST',
          body: updatedManifest
        });

        if (errors.length) {
          errors.forEach(f => {
            const d = document.createElement('div');
            d.style.cssText = 'font-size:0.8rem;color:var(--warn)';
            d.textContent = `Failed: ${f}`;
            errorList.appendChild(d);
          });
        }

        const successCount = total - errors.length;
        completionMsg.textContent = `Sync complete. ${successCount} file${successCount !== 1 ? 's' : ''} uploaded.`;
        completionMsg.style.display = '';
        scanBtn.disabled = false;
        pickBtn.disabled = false;
      });
    }

    // ════════════════════════════════════════════════════════════════════════
    // END ADMIN PANEL
    // ════════════════════════════════════════════════════════════════════════

    async function filterLoadBooks() {
      const display = document.getElementById('index-display');
      display.innerHTML = '';
      document.getElementById('filter-panel').style.display = 'none';

      const registry = await getData('GithubUpload/_books_registry.json');
      if (!registry) {
        filterShowError('_books_registry.json not found in GithubUpload subfolder');
        return;
      }

      bookData = [];
      for (const book of (registry.books || [])) {
        const index = await getData('GithubUpload/' + book.code + '/_index.json');
        if (!index) continue;
        bookData.push({
          title:   book.title,
          subject: book.subject || '',
          class:   book.class   || '',
          board:   book.board   || '',
          code:    book.code,
          files:   index.files  || []
        });
      }

      filterRenderPanel();
    }

    async function filterPickFolder() {
      try {
        folderHandle = await window.showDirectoryPicker();
      } catch {
        return;
      }

      try {
        await folderHandle.getDirectoryHandle('GithubUpload');
      } catch {
        filterShowError('GithubUpload subfolder not found');
        return;
      }

      await authInit();
      userBarRender();
      adminTabInit();
      await filterLoadBooks();
    }

    // ── User info bar ───────────────────────────────────────────────────────
    function userBarRender() {
      const bar = document.getElementById('user-bar');
      bar.innerHTML = '';
      const emailSpan = document.createElement('span');
      emailSpan.textContent = authState.email;
      bar.appendChild(emailSpan);
      if (CONFIG.mode === 'remote') {
        const link = document.createElement('a');
        link.href = 'https://competitionhub.cloudflareaccess.com/cdn-cgi/access/logout';
        link.textContent = 'Sign Out';
        bar.appendChild(link);
      }
    }

    // ── Cloud sync: merge D1 papers + attempts into localStorage ────────────
    function mergeRecords(local, cloud, idField) {
      const map = new Map(local.map(r => [r[idField], r]));
      for (const r of cloud) map.set(r[idField], r); // cloud wins on collision
      return Array.from(map.values());
    }

    async function syncFromCloud() {
      if (CONFIG.mode !== 'remote') return;
      try {
        const headers = {
          'x-access-key':            CONFIG.accessKey,
          'x-user-email':            authState.email,
          'CF-Access-Client-Id':     CONFIG.cfClientId,
          'CF-Access-Client-Secret': CONFIG.cfClientSecret
        };
        const [papersRes, attemptsRes] = await Promise.all([
          fetch(`${CONFIG.workerUrl}/get-papers`,   { headers }),
          fetch(`${CONFIG.workerUrl}/get-attempts`, { headers })
        ]);
        if (papersRes.ok) {
          const rows    = await papersRes.json();
          const cloud   = rows.map(r => JSON.parse(r.paper_json));
          const local   = JSON.parse(localStorage.getItem('ch_papers') || '[]');
          const merged  = mergeRecords(local, cloud, 'id');
          localStorage.setItem('ch_papers', JSON.stringify(merged));
        }
        if (attemptsRes.ok) {
          const rows    = await attemptsRes.json();
          const cloud   = rows.map(r => JSON.parse(r.attempt_json));
          const local   = JSON.parse(localStorage.getItem('ch_attempts') || '[]');
          const merged  = mergeRecords(local, cloud, 'attemptId');
          localStorage.setItem('ch_attempts', JSON.stringify(merged));
        }
      } catch { /* silent — offline or auth failure */ }
    }

    async function filterConnect() {
      await authInit();
      userBarRender();
      adminTabInit();
      remoteReady = true;
      await syncFromCloud();
      await filterLoadBooks();
    }

    document.getElementById('btn-pick-folder')
      .addEventListener('click', filterPickFolder);
    document.getElementById('btn-connect')
      .addEventListener('click', filterConnect);

    // ── Mode initialisation ──────────────────────────────────────────────────
    if (CONFIG.mode === 'remote') {
      document.getElementById('btn-pick-folder').style.display = 'none';
      document.getElementById('btn-connect').style.display = '';
      filterConnect();
    }

    // ── Tab switching ───────────────────────────────────────────────────────
    const tabBtns   = document.querySelectorAll('.tab-btn');
    const tabPanels = document.querySelectorAll('.tab-panel');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        tabPanels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'history') historyRender();
        if (btn.dataset.tab === 'cbt')     cbtRender();
        if (btn.dataset.tab === 'admin')   adminRender();
        if (btn.dataset.tab !== 'cbt')     cbtClearTimer();
      });
    });

    paramInit();
  </script>
