<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompetitionHub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>

  <style>
    :root {
      --ink:     #1a1a2e;
      --paper:   #ffffff;
      --cream:   #faf7f2;
      --accent:  #4f46e5;
      --accent2: #7c3aed;
      --gold:    #d97706;
      --muted:   #6b7280;
      --border:  #e5e7eb;
      --success: #059669;
      --warn:    #dc2626;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .app-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--accent);
      padding: 1rem 0;
      white-space: nowrap;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 0;
      flex: 1;
    }

    .tab-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover {
      color: var(--ink);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Tab panels ── */
    .tab-panel {
      display: none;
      padding: 2rem 1.5rem;
    }

    .tab-panel.active {
      display: block;
    }

    .tab-panel p {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── User info bar ── */
    #user-bar {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    #user-bar a {
      color: var(--accent);
      text-decoration: none;
    }
    #user-bar a:hover { text-decoration: underline; }

    /* ── Filter tab toolbar ── */
    #btn-pick-folder {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--paper);
      border: none;
      border-radius: 6px;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #btn-pick-folder:hover { opacity: 0.85; }

    #index-display {
      margin-top: 1rem;
    }

    .index-error {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--warn);
    }

    /* ── Filter panel ── */
    #filter-panel {
      display: none;
      margin-top: 1.5rem;
    }

    .filter-count-bar {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      padding: 0.75rem 1.1rem;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .filter-count-number {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--accent);
      line-height: 1;
    }

    .filter-count-loading {
      color: var(--muted);
    }

    .filter-count-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .filter-group:last-child {
      margin-bottom: 0;
    }

    .filter-group-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .filter-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      border-left: 2px solid var(--border);
      padding-left: 0.75rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .filter-inline-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1.1rem;
    }

    .filter-checkbox-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--ink);
      cursor: pointer;
      user-select: none;
    }

    .filter-checkbox-item input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .facet-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: 0.25rem;
    }

    .filter-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    /* ── Params panel ── */
    #params-panel {
      display: none;
      margin-top: 1.5rem;
    }

    .params-section-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.75rem;
    }

    .params-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 2rem;
      align-items: flex-end;
      margin-bottom: 0.75rem;
    }

    .params-row:last-child { margin-bottom: 0; }

    .param-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .param-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
    }

    .param-input {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.35rem 0.6rem;
      width: 5.5rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .param-input:focus { border-color: var(--accent); }

    .param-max {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .param-toggle-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.35rem 0;
    }

    .param-toggle-label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--ink);
      cursor: pointer;
      user-select: none;
    }

    .param-toggle-label input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }

    .param-computed {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--ink);
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.35rem 0.6rem;
      min-width: 5.5rem;
      display: inline-block;
    }

    /* ── Generate button ── */
    #btn-generate {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--paper);
      border: none;
      border-radius: 6px;
      padding: 0.65rem 1.6rem;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 1rem;
    }
    #btn-generate:hover    { opacity: 0.85; }
    #btn-generate:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Select tab ── */
    .select-summary-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 1rem 2rem;
      padding: 1rem 1.25rem;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .select-title-wrap { flex: 1; min-width: 200px; }

    .select-title-input {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      outline: none;
      width: 100%;
      padding: 0.1rem 0;
      transition: border-color 0.15s;
    }
    .select-title-input:focus { border-bottom-color: var(--accent); }
    .select-title-input::placeholder { color: var(--muted); opacity: 0.7; }

    .select-meta-field {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .select-meta-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .select-meta-value {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--ink);
    }

    .select-question-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 0;
      margin-bottom: 1.5rem;
      counter-reset: q-counter;
    }

    .select-question-item {
      counter-increment: q-counter;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1.1rem 0.9rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
    }

    .select-question-item::before {
      content: counter(q-counter);
      position: absolute;
      left: 1rem;
      top: 0.9rem;
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--accent);
      line-height: 1;
    }

    .select-q-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .select-q-id {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .select-q-badge {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .select-q-stem {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      line-height: 1.5;
    }

    .select-q-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .select-q-tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
    }

    .select-q-tag--easy   { color: var(--success); border-color: var(--success); background: transparent; }
    .select-q-tag--medium { color: var(--gold);    border-color: var(--gold);    background: transparent; }
    .select-q-tag--hard   { color: var(--warn);    border-color: var(--warn);    background: transparent; }

    .select-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .btn-primary {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--paper);
      border: none;
      border-radius: 6px;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-secondary {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--paper);
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-secondary:hover { opacity: 0.7; }



    /* ── History tab ── */
    .history-list { display: flex; flex-direction: column; gap: 0.75rem; max-width: 800px; }

    .history-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }

    .history-info { flex: 1; min-width: 0; }

    .history-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--ink);
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .history-created {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .history-btns { display: flex; gap: 0.5rem; flex-shrink: 0; }

    .history-section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--ink);
      margin: 1.5rem 0 0.75rem;
    }

    .history-section-title:first-child { margin-top: 0; }

    /* History toggle bar */
    .history-toggle-bar {
      display: flex;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      max-width: 360px;
      margin-bottom: 1.5rem;
    }

    .history-toggle-btn {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      background: var(--paper);
      color: var(--muted);
      border: none;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .history-toggle-btn + .history-toggle-btn { border-left: 1.5px solid var(--border); }
    .history-toggle-btn.active { background: var(--accent); color: var(--paper); }

    /* Progress panel */
    .progress-filters {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      align-items: flex-end;
    }

    .progress-filter-group { flex: 1; min-width: 160px; }

    .progress-filter-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 0.5rem;
    }

    .progress-filter-item {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
    }

    .progress-report { display: flex; flex-direction: column; gap: 1rem; }

    .progress-chapter-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }

    .progress-chapter-header {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--ink);
      margin-bottom: 0.35rem;
    }

    .progress-chapter-summary {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .progress-collapsible-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      background: none;
      color: var(--accent);
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .progress-attempt-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .progress-attempt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.6rem 0.75rem;
      background: var(--cream);
      border-radius: 6px;
    }

    /* Question Analysis */
    .progress-card-btns { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }

    .qa-panel {
      margin-top: 1rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .qa-threshold-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--ink);
    }

    .qa-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }

    .qa-row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      background: var(--cream);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .qa-cb {
      margin-top: 3px;
      flex-shrink: 0;
      accent-color: var(--accent);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .qa-content { flex: 1; min-width: 0; }

    .qa-stem {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 0.3rem;
      line-height: 1.5;
    }

    .qa-stem:hover { color: var(--accent); }
    .qa-stem.expanded { display: block; overflow: visible; }

    .qa-stats {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .qa-detail { margin-top: 0.4rem; }

    .qa-detail-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0.25rem 0;
      border-top: 1px solid var(--border);
    }

    .qa-retest-wrap { display: flex; justify-content: flex-end; margin-top: 0.75rem; }

    /* ── Preview / Print tab — screen ── */
    .preview-actions {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .preview-paper {
      background: var(--paper);
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      border-radius: 8px;
      max-width: 800px;
      margin: 0 auto;
      padding: 2.5rem 3rem;
    }

    .preview-paper-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .preview-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .preview-meta-item strong { color: var(--ink); }

    .preview-hr {
      border: none;
      border-top: 1.5px solid var(--border);
      margin: 1rem 0;
    }

    .preview-instructions {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .preview-instructions ul { margin: 0; padding-left: 1.2rem; }
    .preview-instructions li { margin: 0.2rem 0; }

    .preview-question-list { list-style: none; padding: 0; margin: 0; }

    .preview-question-item {
      margin-bottom: 1.75rem;
      page-break-inside: avoid;
    }

    .preview-q-number {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      font-weight: bold;
      margin-right: 0.35rem;
    }

    .preview-q-stem {
      display: inline;
      font-family: 'DM Sans', sans-serif;
      font-size: 11pt;
      color: var(--ink);
    }

    .preview-q-block {
      margin-bottom: 0.5rem;
    }

    .preview-options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.25rem 1.5rem;
      margin: 0.5rem 0 0 1.2rem;
    }

    .preview-option {
      font-family: 'DM Sans', sans-serif;
      font-size: 10.5pt;
      color: var(--ink);
    }

    .preview-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      margin: 0.6rem 0 0.15rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .preview-statement-list {
      list-style: none;
      padding: 0;
      margin: 0.4rem 0 0.5rem 1.2rem;
    }

    .preview-statement-item {
      font-family: 'DM Sans', sans-serif;
      font-size: 10.5pt;
      margin-bottom: 0.15rem;
    }

    .preview-match-table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.4rem 0 0.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 10.5pt;
    }

    .preview-match-table th {
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      padding: 0.25rem 0.75rem;
    }

    .preview-match-table td {
      padding: 0.2rem 0.75rem;
      vertical-align: top;
    }

    /* Answer key */
    .preview-answer-key { margin-top: 2.5rem; }

    .preview-answer-key-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--ink);
      margin-bottom: 0.2rem;
    }

    .preview-answer-key-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .preview-answer-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.4rem;
    }

    .preview-answer-cell {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 0.3rem 0.5rem;
      background: var(--cream);
      border-radius: 4px;
      text-align: center;
    }

    /* Hints & Solutions */
    .preview-hints-section { margin-top: 2.5rem; }

    .preview-hints-entry {
      margin-bottom: 1.25rem;
      page-break-inside: avoid;
    }

    .preview-hints-qnum {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .preview-hints-label-hint {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.1rem;
    }

    .preview-hints-label-solution {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.1rem;
      margin-top: 0.4rem;
    }

    .preview-hints-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 10.5pt;
      color: var(--ink);
    }

    /* ── CBT attempt screen ── */
    .cbt-container { display: flex; flex-direction: column; gap: 1rem; }

    .cbt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--ink);
      color: var(--paper);
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .cbt-header-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      flex: 1;
    }

    .cbt-timer {
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .cbt-timer.warning { color: #ef4444; }

    .cbt-body {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 1rem;
      align-items: start;
    }

    @media (max-width: 700px) { .cbt-body { grid-template-columns: 1fr; } }

    .cbt-question-area {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }

    .cbt-q-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .cbt-q-number {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--ink);
    }

    .cbt-q-stem {
      font-family: 'DM Sans', sans-serif;
      font-size: 11pt;
      color: var(--ink);
      margin-bottom: 0.75rem;
      line-height: 1.6;
    }

    .cbt-q-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0.6rem 0 0.2rem;
    }

    .cbt-match-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 10.5pt;
    }

    .cbt-match-table th {
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      padding: 0.25rem 0.5rem;
    }

    .cbt-match-table td { padding: 0.2rem 0.5rem; vertical-align: top; }

    .cbt-options { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.5rem; }

    .cbt-option {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 10.5pt;
      transition: border-color 0.15s, background 0.15s;
    }

    .cbt-option:hover { border-color: var(--accent); }
    .cbt-option.selected { border-color: var(--accent); background: #eef2ff; }
    .cbt-option input { margin-top: 2px; flex-shrink: 0; accent-color: var(--accent); }

    .cbt-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .cbt-nav-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      background: var(--paper);
      color: var(--ink);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .cbt-nav-btn:hover { border-color: var(--accent); }
    .cbt-nav-btn:disabled { opacity: 0.4; cursor: default; }

    .cbt-palette-area {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
    }

    .cbt-palette-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.75rem;
    }

    .cbt-palette-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.3rem;
      margin-bottom: 1rem;
    }

    .palette-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      padding: 0.35rem 0.2rem;
      cursor: pointer;
      transition: opacity 0.1s;
    }

    .palette-btn:hover { opacity: 0.8; }
    .palette-btn.palette-current { outline: 2.5px solid var(--accent); outline-offset: 1px; }

    .palette-not-visited    { background: var(--muted);   color: var(--paper); }
    .palette-visited        { background: var(--paper);   color: var(--ink); border: 1.5px solid var(--border); }
    .palette-answered       { background: var(--success); color: var(--paper); }
    .palette-review         { background: var(--accent2); color: var(--paper); }
    .palette-answered-review { background: var(--gold);   color: var(--paper); }

    .cbt-legend { display: flex; flex-direction: column; gap: 0.3rem; }

    .cbt-legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .cbt-legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    /* CBT result */
    .cbt-result { max-width: 700px; }

    .cbt-result-header {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--ink);
      margin-bottom: 1rem;
    }

    .cbt-result-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .cbt-result-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      text-align: center;
    }

    .cbt-result-card-val {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--accent);
    }

    .cbt-result-card-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .cbt-breakdown {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .cbt-breakdown-row {
      display: grid;
      grid-template-columns: 2.5rem 1fr 5rem 5rem 4rem;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      align-items: center;
    }

    .cbt-breakdown-row.header {
      background: var(--cream);
      font-weight: 600;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .cbt-breakdown-row:last-child { border-bottom: none; }
    .cbt-result-correct   { color: var(--success); font-weight: 600; }
    .cbt-result-incorrect { color: var(--warn);    font-weight: 600; }

    .bk-opt {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      border: 1px solid transparent;
      line-height: 1.4;
    }
    .bk-opt-correct { border-color: var(--success); color: var(--success); font-weight: 600; background: #f0fdf4; }
    .bk-opt-wrong   { border-color: var(--warn);    color: var(--warn);    background: #fff7ed; }

    /* ── OMR panel ── */
    .omr-wrap { max-width: 900px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }
    .omr-header {
      display: flex; align-items: flex-start; gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .omr-header-info { flex: 1; }
    .omr-title { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--ink); }
    .omr-meta  { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
    .omr-grid  {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
    }
    .omr-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .omr-qnum {
      font-family: 'DM Serif Display', serif;
      font-size: 0.85rem; font-weight: 700; color: var(--ink);
    }
    .omr-inputs { display: flex; flex-wrap: wrap; gap: 0.35rem 0.6rem; }
    .omr-opt {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.85rem; font-family: 'DM Sans', sans-serif;
      cursor: pointer; user-select: none;
    }
    .omr-opt input { cursor: pointer; accent-color: var(--accent); }
    .omr-clear {
      align-self: flex-start;
      font-size: 0.72rem; padding: 0.15rem 0.45rem;
      background: none; border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; color: var(--muted);
    }
    .omr-clear:hover { border-color: var(--accent); color: var(--accent); }
    .omr-submit-wrap { margin-top: 1.75rem; }

    /* ── Announcement banner ── */
    #announcement-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--gold);
      color: var(--paper);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.6rem 1.5rem;
    }
    #announcement-banner button {
      background: none;
      border: none;
      color: var(--paper);
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      opacity: 0.8;
    }
    #announcement-banner button:hover { opacity: 1; }

    /* ── Admin tab badge ── */
    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--warn);
      color: var(--paper);
      font-size: 0.65rem;
      font-weight: 700;
      min-width: 1.1rem;
      height: 1.1rem;
      border-radius: 999px;
      padding: 0 0.25rem;
      margin-left: 0.35rem;
      vertical-align: middle;
      line-height: 1;
    }

    /* ── Role badge ── */
    .role-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      color: var(--paper);
    }
    .role-badge--superadmin { background: var(--accent); }
    .role-badge--admin      { background: var(--accent2); }
    .role-badge--user       { background: var(--muted); }

    /* ── Admin panel layout ── */
    .admin-panel-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .admin-panel-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--ink);
    }
    .admin-panel-email {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── Admin sub-nav ── */
    .admin-subnav {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .admin-subnav-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0.65rem 1.1rem;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .admin-subnav-btn:hover  { color: var(--ink); }
    .admin-subnav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Admin cards & tables ── */
    .admin-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .admin-card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    .admin-table th {
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .admin-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--cream); }

    /* ── Admin forms ── */
    .admin-form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: flex-end;
      margin-bottom: 1rem;
    }
    .admin-form-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .admin-form-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .admin-input {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.4rem 0.6rem;
      background: var(--paper);
      color: var(--ink);
      min-width: 140px;
    }
    .admin-input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .admin-select {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.4rem 0.6rem;
      background: var(--paper);
      color: var(--ink);
    }
    .admin-textarea {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.4rem 0.6rem;
      background: var(--paper);
      color: var(--ink);
      resize: vertical;
      width: 100%;
    }
    .admin-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      padding: 0.4rem 0.85rem;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .admin-btn:hover { opacity: 0.82; }
    .admin-btn--primary  { background: var(--accent);  color: var(--paper); }
    .admin-btn--danger   { background: var(--warn);    color: var(--paper); }
    .admin-btn--ghost    { background: var(--border);  color: var(--ink);   }
    .admin-btn--success  { background: var(--success); color: var(--paper); }

    /* ── Messages ── */
    .admin-messages-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    .admin-msg-item {
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: background 0.1s;
    }
    .admin-msg-item:hover { background: var(--cream); }
    .admin-msg-item.unread { border-left: 3px solid var(--accent); background: #f0f0ff; }
    .admin-msg-from  { font-size: 0.75rem; color: var(--muted); }
    .admin-msg-subj  { font-weight: 600; font-size: 0.875rem; margin: 0.15rem 0; }
    .admin-msg-body  { font-size: 0.82rem; color: var(--muted); }
    .admin-msg-time  { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem; }

    /* ── Announcement list ── */
    .admin-ann-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .admin-ann-item:last-child { border-bottom: none; }
    .admin-ann-msg  { flex: 1; font-size: 0.875rem; }
    .admin-ann-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }

    /* ── Notes ── */
    .admin-notes-list {
      padding: 0.5rem 0;
    }
    .admin-note-item {
      font-size: 0.82rem;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
    }
    .admin-note-by { font-size: 0.7rem; color: var(--accent); }

    /* ── Print media ── */
    @media print {
      body > *:not(main)         { display: none !important; }
      main .tab-panel            { display: none !important; }
      main #tab-preview          { display: block !important; padding: 0; }
      .preview-actions           { display: none !important; }
      .preview-paper {
        box-shadow: none;
        border-radius: 0;
        max-width: 100%;
        padding: 0;
        margin: 0;
      }
      body { background: white; color: black; }
      .preview-answer-key { page-break-before: always; }
      .preview-question-item { page-break-inside: avoid; }
      @page { margin: 2cm; }
    }
  </style>
</head>
<body>



  <header>
    <span class="app-title">CompetitionHub</span>
    <nav class="tab-bar" role="tablist">
      <button class="tab-btn active" role="tab" data-tab="filter">Filter</button>
      <button class="tab-btn"        role="tab" data-tab="select">Select</button>
      <button class="tab-btn"        role="tab" data-tab="assemble">Assemble</button>
      <button class="tab-btn"        role="tab" data-tab="preview">Preview / Print</button>
      <button class="tab-btn"        role="tab" data-tab="history">History</button>
      <button class="tab-btn"        role="tab" data-tab="cbt">CBT</button>
      <button class="tab-btn" role="tab" data-tab="admin" id="tab-btn-admin" style="display:none">
        Admin<span class="tab-badge" id="admin-tab-badge" style="display:none"></span>
      </button>
    </nav>
    <div id="user-bar"></div>
  </header>

  <div id="announcement-banner"></div>

  <main>
    <div id="tab-filter" class="tab-panel active">

      <button id="btn-pick-folder">Select Question Bank Folder</button>
      <button id="btn-connect" style="display:none">Connect to Question Bank</button>
      <div id="index-display"></div>

      <div id="filter-panel">

        <div class="filter-count-bar">
          <span id="filter-count-number" class="filter-count-number">0</span>
          <span id="filter-count-label" class="filter-count-label">Select books and chapters to begin</span>
        </div>

        <div class="filter-grid">
          <div class="filter-group">
            <span class="filter-group-label">Books</span>
            <div id="filter-books-list" class="filter-list"></div>
          </div>
          <div class="filter-group">
            <span class="filter-group-label">Chapters</span>
            <div id="filter-chapters-list" class="filter-list"></div>
          </div>
        </div>

        <hr class="filter-divider">

        <div class="filter-group">
          <span class="filter-group-label">Type</span>
          <div id="filter-types-list" class="filter-inline-list"></div>
        </div>

        <div class="filter-group">
          <span class="filter-group-label">Difficulty</span>
          <div id="filter-difficulties-list" class="filter-inline-list"></div>
        </div>

        <div class="filter-group">
          <span class="filter-group-label">Bloom Level</span>

      <!-- ── Test Parameters ── -->
      <div id="params-panel">

        <div class="params-section-label">Test Parameters</div>

        <div class="params-row">
          <div class="param-group">
            <label class="param-label" for="param-q-count">Questions</label>
            <input type="number" id="param-q-count" class="param-input" min="1" value="1">
            <span id="param-q-max" class="param-max">of 0</span>
            <span id="param-plan-note" class="param-max" style="display:none;color:var(--muted);font-size:0.78rem;margin-top:0.2rem;"></span>
          </div>
          <div class="param-group">
            <label class="param-label" for="param-marks-per-q">Marks / question</label>
            <input type="number" id="param-marks-per-q" class="param-input" min="0.25" step="0.25" value="1">
          </div>

            <span class="param-label">Negative marking</span>
            <div class="param-toggle-row">
              <label class="param-toggle-label">
                <input type="checkbox" id="param-neg-toggle">
                <span>On</span>
              </label>

                     min="0.25" step="0.25" value="0.25" style="display:none">
            </div>

        <div class="params-row">
          <div class="param-group">
            <span class="param-label">Total marks</span>
            <span id="param-total-marks" class="param-computed">—</span>
          </div>
          <div class="param-group">

    </div>

    <div id="tab-assemble" class="tab-panel"><p>Assemble tab</p></div>
    <div id="tab-preview"  class="tab-panel"><p>Preview / Print tab</p></div>
    <div id="tab-history"  class="tab-panel"></div>
    <div id="tab-cbt"      class="tab-panel"></div>
    <div id="tab-admin"    class="tab-panel"></div>
  </main>

  <script>
    const isLocal = location.hostname === 'localhost' || location.protocol === 'file:';
    const CONFIG = {
      mode: isLocal ? 'local' : 'remote',
      workerUrl: 'https://api.examsindia.org',
      accessKey: 'ch-qbank-2026',
      cfClientId: '0da91d60f6e5c78fef20cd0cd025ccbc.access',
      cfClientSecret: 'eddae1e25e0d7b0d9bebc3c50843fe1289a54ed849ed7e651dd6942874b2c8af'
    };

    // ── Auth / plan state ────────────────────────────────────────────────────
    const authState = { email: null, role: null, plan: null };

    async function authInit() {
      if (isLocal) {
        authState.email = 'drtyagivet@gmail.com';
        return;
      }
      // Remote: read Cloudflare Access identity
      try {
        const res = await fetch(`https://${window.location.hostname}/cdn-cgi/access/get-identity`, {
          credentials: 'include'
        });
        if (!res.ok) throw new Error('identity');
        const identity = await res.json();
        authState.email = identity.email;
      } catch {
        window.location.href = `https://competitionhub.cloudflareaccess.com/cdn-cgi/access/login/${window.location.hostname}`;
        return;
      }
      // Fetch plan from Worker
      const planData = await getData('__user_plan__');
      if (planData) {
        authState.role = planData.role;
        authState.plan = {
          max_questions:   planData.max_questions,
          max_books:       planData.max_books,
          allow_extracted: planData.allow_extracted,
          filter_types:    planData.filter_types
        };
      }
    }

    let folderHandle = null;
    let remoteReady = false;
    let bookData = [];
    let loadedQuestions = {};

    const FILTER_TYPES       = ['mcq_single', 'mcq_multi', 'assertion_reason', 'statement_based', 'match_following'];
    const FILTER_DIFFICULTIES = ['easy', 'medium', 'hard'];
    const FILTER_BLOOM        = ['remember', 'understand', 'apply', 'analyze', 'evaluate'];
    const FILTER_SOURCE       = ['extracted', 'modified', 'created'];

    let filterState = {
      books:       new Set(),
      chapters:    new Set(),
      types:       new Set(),
      difficulties: new Set(),
      bloomLevels: new Set(),
      sourceTypes: new Set()
    };

    let paperParams = {
      questionCount:     1,
      marksPerQ:         1,
      negativeMarking:   false,
      negativeMarksPerQ: 0.25
    };

    let paper = null;
    let cbt   = null;

    async function getData(path) {
      // Special route: fetch user plan (bypasses remoteReady gate)
      if (path === '__user_plan__') {
        try {
          const res = await fetch(`${CONFIG.workerUrl}/user-plan`, {
            headers: {
              'x-access-key':  CONFIG.accessKey,
              'x-user-email':  authState.email
            }
          });
          if (!res.ok) return null;
          return await res.json();
        } catch {
          return null;
        }
      }

      if (CONFIG.mode === 'local') {
        if (!folderHandle) return null;
        try {
          const parts = path.split('/');
          let dir = folderHandle;
          for (let i = 0; i < parts.length - 1; i++) {
            dir = await dir.getDirectoryHandle(parts[i]);
          }
          const fileHandle = await dir.getFileHandle(parts[parts.length - 1]);
          const file = await fileHandle.getFile();
          const text = await file.text();
          return JSON.parse(text);
        } catch {
          return null;
        }
      } else {
        if (!remoteReady) return null;
        try {
          const cleanPath = path.replace(/^GithubUpload\//, '');
          const res = await fetch(`${CONFIG.workerUrl}/${cleanPath}`, {
            headers: {
              'x-access-key':  CONFIG.accessKey,
              'x-user-email':  authState.email,
              'CF-Access-Client-Id':     CONFIG.cfClientId,
              'CF-Access-Client-Secret': CONFIG.cfClientSecret
            }
          });
          if (!res.ok) return null;
          return await res.json();
        } catch {
          return null;
        }
      }
    }

    // ── Authenticated remote POST helper ────────────────────────────────────
    async function workerPost(path, body) {
      if (CONFIG.mode !== 'remote') return;
      try {
        await fetch(`${CONFIG.workerUrl}/${path}`, {
          method: 'POST',
          headers: {
            'Content-Type':            'application/json',
            'x-access-key':            CONFIG.accessKey,
            'x-user-email':            authState.email,
            'CF-Access-Client-Id':     CONFIG.cfClientId,
            'CF-Access-Client-Secret': CONFIG.cfClientSecret
          },
          body: JSON.stringify(body)
        });
      } catch { /* fire-and-forget */ }
    }

    // ── Filter state helpers ────────────────────────────────────────────────

    function filterInitState() {
      filterState.books        = new Set();
      filterState.chapters     = new Set();
      filterState.types        = new Set(FILTER_TYPES);
      filterState.difficulties = new Set(FILTER_DIFFICULTIES);
      filterState.bloomLevels  = new Set(FILTER_BLOOM);
      filterState.sourceTypes  = new Set(FILTER_SOURCE);
      loadedQuestions = {};
    }

    function filterUpdateCount() {
      const numEl   = document.getElementById('filter-count-number');
      const labelEl = document.getElementById('filter-count-label');

      if (filterState.chapters.size === 0) {
        numEl.textContent = '0';
        numEl.classList.remove('filter-count-loading');
        labelEl.textContent = 'Select books and chapters to begin';
        filterUpdateFacets();
        paramUpdateMax();
        return;
      }

      let count = 0;
      for (const key of Object.keys(loadedQuestions)) {
        if (!filterState.chapters.has(key)) continue;
        for (const q of loadedQuestions[key]) {
          if (
            filterState.types.has(q.type) &&
            filterState.difficulties.has(q.difficulty) &&
            filterState.bloomLevels.has(q.bloom_level) &&
            filterState.sourceTypes.has(q.source_type)
          ) count++;
        }
      }
      numEl.textContent = count;
      numEl.classList.remove('filter-count-loading');
      labelEl.textContent = 'questions matching filters';
      filterUpdateFacets();
      paramUpdateMax();
    }

    function computeFacet(group, value) {
      if (group === 'book') {
        const book = bookData.find(b => b.code === value);
        if (!book) return 0;
        let exact = 0, approx = 0;
        book.files.forEach(f => {
          const key = book.code + '::' + f.file;
          if (loadedQuestions[key]) {
            for (const q of loadedQuestions[key]) {
              if (
                filterState.types.has(q.type) &&
                filterState.difficulties.has(q.difficulty) &&
                filterState.bloomLevels.has(q.bloom_level) &&
                filterState.sourceTypes.has(q.source_type)
              ) exact++;
            }
          } else {
            approx += f.count;
          }
        });
        return approx > 0 ? '~' + (exact + approx) : exact;
      }

      if (group === 'chapter') {
        if (!loadedQuestions[value]) {
          const [bookCode, filename] = value.split('::');
          const book = bookData.find(b => b.code === bookCode);
          const file = book && book.files.find(f => f.file === filename);
          return file ? '~' + file.count : '';
        }
        let count = 0;
        for (const q of loadedQuestions[value]) {
          if (
            filterState.types.has(q.type) &&
            filterState.difficulties.has(q.difficulty) &&
            filterState.bloomLevels.has(q.bloom_level) &&
            filterState.sourceTypes.has(q.source_type)
          ) count++;
        }
        return count;
      }

      if (group === 'type') {
        let count = 0;
        for (const key of Object.keys(loadedQuestions)) {
          if (!filterState.chapters.has(key)) continue;
          for (const q of loadedQuestions[key]) {
            if (
              q.type === value &&
              filterState.difficulties.has(q.difficulty) &&
              filterState.bloomLevels.has(q.bloom_level) &&
              filterState.sourceTypes.has(q.source_type)
            ) count++;
          }
        }
        return count;
      }

      if (group === 'difficulty') {
        let count = 0;
        for (const key of Object.keys(loadedQuestions)) {
          if (!filterState.chapters.has(key)) continue;
          for (const q of loadedQuestions[key]) {
            if (
              filterState.types.has(q.type) &&
              q.difficulty === value &&
              filterState.bloomLevels.has(q.bloom_level) &&
              filterState.sourceTypes.has(q.source_type)
            ) count++;
          }
        }
        return count;
      }

      if (group === 'bloom') {
        let count = 0;
        for (const key of Object.keys(loadedQuestions)) {
          if (!filterState.chapters.has(key)) continue;
          for (const q of loadedQuestions[key]) {
            if (
              filterState.types.has(q.type) &&
              filterState.difficulties.has(q.difficulty) &&
              q.bloom_level === value &&
              filterState.sourceTypes.has(q.source_type)
            ) count++;
          }
        }
        return count;
      }

      if (group === 'source') {
        let count = 0;
        for (const key of Object.keys(loadedQuestions)) {
          if (!filterState.chapters.has(key)) continue;
          for (const q of loadedQuestions[key]) {
            if (
              filterState.types.has(q.type) &&
              filterState.difficulties.has(q.difficulty) &&
              filterState.bloomLevels.has(q.bloom_level) &&
              q.source_type === value
            ) count++;
          }
        }
        return count;
      }

      return 0;
    }

    function filterUpdateFacets() {
      document.querySelectorAll('.facet-count').forEach(span => {
        const label = span.closest('[data-group]');
        if (!label) return;
        span.textContent = computeFacet(label.dataset.group, label.dataset.value);
      });
    }

    async function filterLoadSelectedChapters() {
      const el = document.getElementById('filter-count-number');
      el.textContent = '…';
      el.classList.add('filter-count-loading');

      // Evict chapters no longer selected
      for (const key of Object.keys(loadedQuestions)) {
        if (!filterState.chapters.has(key)) delete loadedQuestions[key];
      }

      // Fetch chapters not yet loaded
      const fetches = [];
      for (const key of filterState.chapters) {
        if (loadedQuestions[key]) continue;
        const [bookCode, filename] = key.split('::');
        fetches.push(
          getData('GithubUpload/' + bookCode + '/' + filename).then(data => {
            if (Array.isArray(data))                        loadedQuestions[key] = data;
            else if (data && Array.isArray(data.questions)) loadedQuestions[key] = data.questions;
            else                                            loadedQuestions[key] = [];
          })
        );
      }
      await Promise.all(fetches);
      filterUpdateCount();
    }

    // ── Filter render functions ─────────────────────────────────────────────

    function filterRenderChapters() {
      const container = document.getElementById('filter-chapters-list');
      container.innerHTML = '';

      bookData.forEach(b => {
        if (!filterState.books.has(b.code)) return;
        b.files.forEach(f => {
          const key = b.code + '::' + f.file;
          const label = document.createElement('label');
          label.className = 'filter-checkbox-item';
          label.dataset.group = 'chapter';
          label.dataset.value = key;

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = filterState.chapters.has(key);
          cb.addEventListener('change', () => {
            if (cb.checked) filterState.chapters.add(key);
            else            filterState.chapters.delete(key);
            filterLoadSelectedChapters();
          });

          const text = bookData.length > 1
            ? `Ch ${f.chapter} — ${f.chapter_name} (${b.title})`
            : `Ch ${f.chapter} — ${f.chapter_name}`;

          const facet = document.createElement('span');
          facet.className = 'facet-count';

          label.appendChild(cb);
          label.appendChild(document.createTextNode(' ' + text));
          label.appendChild(facet);
          container.appendChild(label);
        });
      });
    }

    function filterRenderInlineGroup(containerId, values, stateSet, group) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      values.forEach(v => {
        const label = document.createElement('label');
        label.className = 'filter-checkbox-item';
        label.dataset.group = group;
        label.dataset.value = v;

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = true;
        cb.addEventListener('change', () => {
          if (cb.checked) stateSet.add(v);
          else            stateSet.delete(v);
          filterUpdateCount();
        });

        const facet = document.createElement('span');
        facet.className = 'facet-count';

        label.appendChild(cb);
        label.appendChild(document.createTextNode(' ' + v.replace(/_/g, ' ')));
        label.appendChild(facet);
        container.appendChild(label);
      });
    }

    function filterRenderPanel() {
      filterInitState();

      // Books
      const booksList = document.getElementById('filter-books-list');
      booksList.innerHTML = '';
      bookData.forEach(b => {
        const label = document.createElement('label');
        label.className = 'filter-checkbox-item';
        label.dataset.group = 'book';
        label.dataset.value = b.code;

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = filterState.books.has(b.code);
        cb.addEventListener('change', () => {
          if (cb.checked) {
            filterState.books.add(b.code);
            b.files.forEach(f => filterState.chapters.add(b.code + '::' + f.file));
          } else {
            filterState.books.delete(b.code);
            b.files.forEach(f => filterState.chapters.delete(b.code + '::' + f.file));
          }
          filterRenderChapters();
          filterLoadSelectedChapters();
        });

        const facet = document.createElement('span');
        facet.className = 'facet-count';

        label.appendChild(cb);
        label.appendChild(document.createTextNode(' ' + b.title));
        label.appendChild(facet);
        booksList.appendChild(label);
      });

      filterRenderChapters();

      filterRenderInlineGroup('filter-types-list',        FILTER_TYPES,        filterState.types,        'type');
      filterRenderInlineGroup('filter-difficulties-list', FILTER_DIFFICULTIES, filterState.difficulties, 'difficulty');
      filterRenderInlineGroup('filter-bloom-list',        FILTER_BLOOM,        filterState.bloomLevels,  'bloom');
      filterRenderInlineGroup('filter-source-list',       FILTER_SOURCE,       filterState.sourceTypes,  'source');

      document.getElementById('filter-panel').style.display = 'block';
      filterUpdateCount();
    }

    // ── Paper parameters ────────────────────────────────────────────────────

    function paramGetFilteredPool() {
      const pool = [];
      for (const key of Object.keys(loadedQuestions)) {
        if (!filterState.chapters.has(key)) continue;
        for (const q of loadedQuestions[key]) {
          if (
            filterState.types.has(q.type) &&
            filterState.difficulties.has(q.difficulty) &&
            filterState.bloomLevels.has(q.bloom_level) &&
            filterState.sourceTypes.has(q.source_type)
          ) pool.push(q);
        }
      }
      return pool;
    }

    function paramComputeDuration(pool) {
      if (pool.length === 0) return '—';
      let totalSec = 0;
      for (const q of pool) {
        totalSec += (q.avg_time_sec != null ? q.avg_time_sec : 90);
      }
      const mean   = totalSec / pool.length;
      const estSec = mean * paperParams.questionCount;
      const totalMin = Math.round(estSec / 60);
      const hr  = Math.floor(totalMin / 60);
      const min = totalMin % 60;
      if (hr === 0) return '~' + min + ' min';
      if (min === 0) return '~' + hr + ' hr';
      return '~' + hr + ' hr ' + min + ' min';
    }

    function paramUpdateDerived() {
      const pool        = paramGetFilteredPool();
      const totalMarks  = parseFloat((paperParams.questionCount * paperParams.marksPerQ).toFixed(2));
      const duration    = pool.length > 0 ? paramComputeDuration(pool) : '—';
      document.getElementById('param-total-marks').textContent = totalMarks;
      document.getElementById('param-duration').textContent    = duration;
      document.getElementById('param-q-max').textContent       = 'of ' + pool.length;
    }

    function paramUpdateMax() {
      const pool = paramGetFilteredPool();
      const poolMax = pool.length;
      const panel = document.getElementById('params-panel');

      if (poolMax === 0) {
        panel.style.display = 'none';
        return;
      }

      panel.style.display = 'block';

      // Apply plan cap if available
      const planMax = authState.plan ? authState.plan.max_questions : Infinity;
      const max = Math.min(poolMax, planMax);

      if (paperParams.questionCount > max) paperParams.questionCount = max;
      if (paperParams.questionCount < 1)   paperParams.questionCount = 1;

      const input = document.getElementById('param-q-count');
      input.max   = max;
      input.value = paperParams.questionCount;

      // Show plan note
      const noteEl = document.getElementById('param-plan-note');
      if (authState.plan) {
        noteEl.textContent = 'Your plan allows up to ' + authState.plan.max_questions + ' questions per test.';
        noteEl.style.display = 'block';
      } else {
        noteEl.style.display = 'none';
      }

      document.getElementById('btn-generate').disabled = (max === 0);

      paramUpdateDerived();
    }

    function paramInit() {
      const qCountEl  = document.getElementById('param-q-count');
      const marksEl   = document.getElementById('param-marks-per-q');
      const negToggle = document.getElementById('param-neg-toggle');
      const negMarks  = document.getElementById('param-neg-marks');

      qCountEl.addEventListener('input', () => {
        const pool    = paramGetFilteredPool();
        const planMax = authState.plan ? authState.plan.max_questions : Infinity;
        const cap     = Math.min(pool.length, planMax);
        let v = parseInt(qCountEl.value, 10);
        if (isNaN(v) || v < 1) v = 1;
        if (v > cap)            v = cap;
        paperParams.questionCount = v;
        paramUpdateDerived();
      });
      qCountEl.addEventListener('blur', () => {
        qCountEl.value = paperParams.questionCount;
      });

      marksEl.addEventListener('input', () => {
        let v = parseFloat(marksEl.value);
        if (isNaN(v) || v < 0.25) v = 0.25;
        paperParams.marksPerQ = v;
        paramUpdateDerived();
      });
      marksEl.addEventListener('blur', () => {
        marksEl.value = paperParams.marksPerQ;
      });

      negToggle.addEventListener('change', () => {
        paperParams.negativeMarking  = negToggle.checked;
        negMarks.style.display       = negToggle.checked ? 'inline-block' : 'none';
      });

      negMarks.addEventListener('input', () => {
        let v = parseFloat(negMarks.value);
        if (isNaN(v) || v < 0.25) v = 0.25;
        paperParams.negativeMarksPerQ = v;
      });
      negMarks.addEventListener('blur', () => {
        negMarks.value = paperParams.negativeMarksPerQ;
      });

      document.getElementById('btn-generate')
        .addEventListener('click', paperGenerate);
    }

    // ── Paper generation ────────────────────────────────────────────────────

    function renderMath(el) {
      if (typeof renderMathInElement === 'function') {
        renderMathInElement(el, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$',  right: '$',  display: false },
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true }
          ],
          throwOnError: false
        });
      }
    }

    function switchTab(name) {
      if (name !== 'cbt') cbtClearTimer();
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      const btn = document.querySelector(`.tab-btn[data-tab="${name}"]`);
      if (btn) btn.classList.add('active');
      const panel = document.getElementById('tab-' + name);
      if (panel) panel.classList.add('active');
    }

    function paperGenerate() {
      const pool = paramGetFilteredPool();
      if (pool.length === 0) return;

      // Fisher-Yates shuffle on a copy
      const shuffled = [...pool];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      const selected = shuffled.slice(0, paperParams.questionCount);

      // Exact duration from selected questions
      let totalSec = 0;
      for (const q of selected) {
        totalSec += (q.avg_time_sec != null ? q.avg_time_sec : 90);
      }
      const totalMin = Math.round(totalSec / 60);
      const hr  = Math.floor(totalMin / 60);
      const min = totalMin % 60;
      const durationStr = hr === 0 ? min + ' min'
                        : min === 0 ? hr + ' hr'
                        : hr + ' hr ' + min + ' min';

      paper = {
        id:        crypto.randomUUID(),
        generated: new Date().toISOString(),
        meta: {
          title:             '',
          date:              new Date().toLocaleDateString('en-IN'),
          duration:          durationStr,
          totalMarks:        parseFloat((paperParams.questionCount * paperParams.marksPerQ).toFixed(2)),
          marksPerQ:         paperParams.marksPerQ,
          negativeMarking:   paperParams.negativeMarking,
          negativeMarksPerQ: paperParams.negativeMarksPerQ
        },
        questions: selected
      };

      paperSave();
      selectRender();
      switchTab('select');
    }

    function paperSave() {
      const entry = {
        id:                paper.id,
        title:             paper.meta.title,
        date:              paper.meta.date,
        duration:          paper.meta.duration,
        totalMarks:        paper.meta.totalMarks,
        marksPerQ:         paper.meta.marksPerQ,
        negativeMarking:   paper.meta.negativeMarking,
        negativeMarksPerQ: paper.meta.negativeMarksPerQ,
        questionCount:     paper.questions.length,
        questions:         paper.questions,
        createdAt:         new Date().toISOString()
      };
      const existing = JSON.parse(localStorage.getItem('ch_papers') || '[]');
      existing.push(entry);
      localStorage.setItem('ch_papers', JSON.stringify(existing));
      workerPost('save-paper', entry);
    }

    function selectRender() {
      const tab = document.getElementById('tab-select');
      tab.innerHTML = '';

      // ── Summary bar ──
      const bar = document.createElement('div');
      bar.className = 'select-summary-bar';

    function previewRender() {
      const tab = document.getElementById('tab-preview');
      tab.innerHTML = '';

      // ── Screen-only action bar ──
      const actions = document.createElement('div');
      actions.className = 'preview-actions';

      const btnBack = document.createElement('button');

      actions.appendChild(btnBack);
      actions.appendChild(btnPrint);
      tab.appendChild(actions);

      // ── Paper card ──
      const card = document.createElement('div');
      card.className = 'preview-paper';

      const m = paper.meta;

      // Header
      const titleEl = document.createElement('div');
      titleEl.className   = 'preview-paper-title';
      titleEl.textContent = m.title || 'Untitled Test';
      card.appendChild(titleEl);

      const metaRow = document.createElement('div');
      metaRow.className = 'preview-meta-row';
      [
        { label: 'Date',     value: m.date },
        { label: 'Duration', value: m.duration },
        { label: 'Marks',    value: m.totalMarks },
        { label: 'Questions', value: paper.questions.length }
      ].forEach(({ label, value }) => {
        const item = document.createElement('span');
        item.className = 'preview-meta-item';
        item.innerHTML = `<strong>${value}</strong> ${label}`;
        metaRow.appendChild(item);
      });
      card.appendChild(metaRow);

      const hr = document.createElement('hr');
      hr.className = 'preview-hr';
      card.appendChild(hr);

      // Instructions
      const instrDiv = document.createElement('div');
      instrDiv.className = 'preview-instructions';
      const instrUl = document.createElement('ul');
      const instrItems = [
        'All questions carry equal marks.',
        'Read each question carefully before answering.'
      ];
      if (m.negativeMarking) {
        instrItems.push(`Each wrong answer carries −${m.negativeMarksPerQ} marks.`);
      }
      instrItems.forEach(text => {
        const li = document.createElement('li');
        li.textContent = text;
        instrUl.appendChild(li);
      });
      instrDiv.appendChild(instrUl);
      card.appendChild(instrDiv);

      // Question list
      const ol = document.createElement('ol');
      ol.className = 'preview-question-list';

      const ROMAN = ['i','ii','iii','iv','v','vi','vii','viii','ix','x'];

      paper.questions.forEach((q, idx) => {
        const li = document.createElement('li');
        li.className = 'preview-question-item';

        const type = q.type || 'mcq_single';

        function makeLabel(text) {
          const d = document.createElement('div');
          d.className   = 'preview-label';
          d.textContent = text;
          return d;
        }

        function makeStemBlock(text) {
          const d = document.createElement('div');
          d.className = 'preview-q-block';
          const num = document.createElement('span');
          num.className   = 'preview-q-number';
          num.textContent = `${idx + 1}.`;
          const stem = document.createElement('span');
          stem.className   = 'preview-q-stem';
          stem.textContent = text || '';
          d.appendChild(num);
          d.appendChild(stem);
          return d;
        }

        function makeOptionsGrid(opts) {
          const grid = document.createElement('div');
          grid.className = 'preview-options-grid';
          opts.forEach(({ key, text }) => {
            const div = document.createElement('div');
            div.className   = 'preview-option';
            div.textContent = `${key}. ${text}`;
            grid.appendChild(div);
          });
          return grid;
        }

        if (type === 'assertion_reason') {
          const numSpan = document.createElement('span');
          numSpan.className   = 'preview-q-number';
          numSpan.textContent = `${idx + 1}.`;
          li.appendChild(numSpan);
          li.appendChild(makeLabel('Assertion (A):'));
          const aText = document.createElement('div');
          aText.className   = 'preview-q-block';
          const aSpan = document.createElement('span');
          aSpan.className   = 'preview-q-stem';
          aSpan.textContent = q.assertion || '';
          aText.appendChild(aSpan);
          li.appendChild(aText);
          li.appendChild(makeLabel('Reason (R):'));
          const rText = document.createElement('div');
          rText.className   = 'preview-q-block';
          const rSpan = document.createElement('span');
          rSpan.className   = 'preview-q-stem';
          rSpan.textContent = q.reason || '';
          rText.appendChild(rSpan);
          li.appendChild(rText);
          li.appendChild(makeOptionsGrid([
            { key: 'A', text: 'Both A and R are true and R is the correct explanation of A' },
            { key: 'B', text: 'Both A and R are true but R is not the correct explanation of A' },
            { key: 'C', text: 'A is true but R is false' },
            { key: 'D', text: 'A is false but R is true' }
          ]));

        } else if (type === 'statement_based') {
          li.appendChild(makeStemBlock(q.stem));
          li.appendChild(makeOptionsGrid(q.options || []));

        } else if (type === 'match_following') {
          const numSpan = document.createElement('span');
          numSpan.className   = 'preview-q-number';
          numSpan.textContent = `${idx + 1}.`;
          li.appendChild(numSpan);
          const table = document.createElement('table');
          table.className = 'preview-match-table';
          const thead = document.createElement('thead');
          const hRow  = document.createElement('tr');
          ['List I', 'List II'].forEach(h => {
            const th = document.createElement('th');
            th.textContent = h;
            hRow.appendChild(th);
          });
          thead.appendChild(hRow);
          table.appendChild(thead);
          const tbody   = document.createElement('tbody');
          const listI   = q.list_i  || [];
          const listII  = q.list_ii || [];
          const rowCount = Math.max(listI.length, listII.length);
          for (let i = 0; i < rowCount; i++) {
            const tr = document.createElement('tr');
            const tdI  = document.createElement('td');
            tdI.textContent  = listI[i]  ? `${i + 1}. ${listI[i]}`   : '';
            const tdII = document.createElement('td');
            tdII.textContent = listII[i] ? `${ROMAN[i]}. ${listII[i]}` : '';
            tr.appendChild(tdI);
            tr.appendChild(tdII);
            tbody.appendChild(tr);
          }
          table.appendChild(tbody);
          li.appendChild(table);
          const stemDiv = document.createElement('div');
          stemDiv.className   = 'preview-q-block';
          const stemSpan = document.createElement('span');
          stemSpan.className   = 'preview-q-stem';
          stemSpan.textContent = q.stem || '';
          stemDiv.appendChild(stemSpan);
          li.appendChild(stemDiv);
          li.appendChild(makeOptionsGrid(q.options || []));

        } else {
          // mcq_single / mcq_multi
          li.appendChild(makeStemBlock(q.stem));
          li.appendChild(makeOptionsGrid(q.options || []));
        }

        ol.appendChild(li);
      });

      card.appendChild(ol);

      // ── Answer key ──
      const ak = document.createElement('div');
      ak.className = 'preview-answer-key';

      const akTitle = document.createElement('div');
      akTitle.className   = 'preview-answer-key-title';
      akTitle.textContent = 'Answer Key';
      ak.appendChild(akTitle);

      const akSub = document.createElement('div');
      akSub.className   = 'preview-answer-key-sub';
      akSub.textContent = `${m.title || 'Untitled Test'} — ${m.date}`;
      ak.appendChild(akSub);

      const akGrid = document.createElement('div');
      akGrid.className = 'preview-answer-grid';
      paper.questions.forEach((q, idx) => {
        const cell = document.createElement('div');
        cell.className   = 'preview-answer-cell';
        cell.textContent = `${idx + 1}. ${q.correct || '—'}`;
        akGrid.appendChild(cell);
      });
      ak.appendChild(akGrid);
      card.appendChild(ak);

      // ── Hints & Solutions ──
      const hintEntries = paper.questions.filter(q => q.hint || q.solution);
      if (hintEntries.length > 0) {
        const hs = document.createElement('div');
        hs.className = 'preview-hints-section preview-answer-key';

        const hsTitle = document.createElement('div');
        hsTitle.className   = 'preview-answer-key-title';
        hsTitle.textContent = 'Hints & Solutions';
        hs.appendChild(hsTitle);

        const hsSub = document.createElement('div');
        hsSub.className   = 'preview-answer-key-sub';
        hsSub.textContent = `${m.title || 'Untitled Test'} — ${m.date}`;
        hs.appendChild(hsSub);

        paper.questions.forEach((q, idx) => {
          if (!q.hint && !q.solution) return;
          const entry = document.createElement('div');
          entry.className = 'preview-hints-entry';

          const qnum = document.createElement('div');
          qnum.className   = 'preview-hints-qnum';
          qnum.textContent = `Q${idx + 1}  ${q.question_id || ''}`;
          entry.appendChild(qnum);

          if (q.hint) {
            const label = document.createElement('div');
            label.className   = 'preview-hints-label-hint';
            label.textContent = 'Hint';
            entry.appendChild(label);
            const text = document.createElement('div');
            text.className   = 'preview-hints-text';
            text.textContent = q.hint;
            entry.appendChild(text);
          }

          if (q.solution) {
            const label = document.createElement('div');
            label.className   = 'preview-hints-label-solution';
            label.textContent = 'Solution';
            entry.appendChild(label);
            const text = document.createElement('div');
            text.className   = 'preview-hints-text';
            text.textContent = q.solution;
            entry.appendChild(text);
          }

          hs.appendChild(entry);
        });

        card.appendChild(hs);
      }

      tab.appendChild(card);
      renderMath(card);
    }
