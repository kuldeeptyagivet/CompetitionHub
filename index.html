<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompetitionHub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:     #1a1a2e;
      --paper:   #ffffff;
      --cream:   #faf7f2;
      --accent:  #4f46e5;
      --accent2: #7c3aed;
      --gold:    #d97706;
      --muted:   #6b7280;
      --border:  #e5e7eb;
      --success: #059669;
      --warn:    #dc2626;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .app-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--accent);
      padding: 1rem 0;
      white-space: nowrap;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 0;
      flex: 1;
    }

    .tab-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover {
      color: var(--ink);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Tab panels ── */
    .tab-panel {
      display: none;
      padding: 2rem 1.5rem;
    }

    .tab-panel.active {
      display: block;
    }

    .tab-panel p {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Filter tab ── */
    #btn-pick-folder {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--paper);
      border: none;
      border-radius: 6px;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #btn-pick-folder:hover { opacity: 0.85; }

    #index-display {
      margin-top: 1.5rem;
    }

    .index-error {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--warn);
    }

    .book-block {
      margin-bottom: 1.5rem;
    }

    .book-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--ink);
      margin-bottom: 0.2rem;
    }

    .book-subheading {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .chapter-list {
      list-style: none;
      border-left: 2px solid var(--border);
      padding-left: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .chapter-list li {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--ink);
    }

    .chapter-list li .ch-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: 0.5rem;
    }

    /* ── Auth overlay ── */
    #auth-overlay {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--ink);
      color: var(--paper);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 9999;
    }

    #auth-overlay p {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      opacity: 0.85;
    }

    #auth-overlay button {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--paper);
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
      opacity: 0.7;
    }

    #auth-overlay button:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Auth overlay (visible by default; dismiss for dev access) -->
  <div id="auth-overlay">
    <p>Access control placeholder</p>
    <button onclick="document.getElementById('auth-overlay').style.display='none'">
      Dismiss (dev only)
    </button>
  </div>

  <header>
    <span class="app-title">CompetitionHub</span>
    <nav class="tab-bar" role="tablist">
      <button class="tab-btn active" role="tab" data-tab="filter">Filter</button>
      <button class="tab-btn"        role="tab" data-tab="select">Select</button>
      <button class="tab-btn"        role="tab" data-tab="assemble">Assemble</button>
      <button class="tab-btn"        role="tab" data-tab="preview">Preview / Print</button>
    </nav>
  </header>

  <main>
    <div id="tab-filter" class="tab-panel active">
      <button id="btn-pick-folder">Select Question Bank Folder</button>
      <div id="index-display"></div>
    </div>
    <div id="tab-select"  class="tab-panel"><p>Select tab</p></div>
    <div id="tab-assemble" class="tab-panel"><p>Assemble tab</p></div>
    <div id="tab-preview" class="tab-panel"><p>Preview / Print tab</p></div>
  </main>

  <script>
    const CONFIG = {
      mode: 'local',
      workerUrl: 'https://qbank.yourname.workers.dev',
      accessKey: ''
    };

    let folderHandle = null;
    let bookData = [];

    async function getData(path) {
      if (CONFIG.mode === 'local') {
        if (!folderHandle) return null;
        try {
          const parts = path.split('/');
          let dir = folderHandle;
          for (let i = 0; i < parts.length - 1; i++) {
            dir = await dir.getDirectoryHandle(parts[i]);
          }
          const fileHandle = await dir.getFileHandle(parts[parts.length - 1]);
          const file = await fileHandle.getFile();
          const text = await file.text();
          return JSON.parse(text);
        } catch {
          return null;
        }
      } else {
        console.log('Worker not yet implemented');
        return null;
      }
    }

    // Filter tab — folder picker
    function filterRenderIndex() {
      const display = document.getElementById('index-display');
      display.innerHTML = '';

      bookData.forEach(book => {
        const block = document.createElement('div');
        block.className = 'book-block';

        const heading = document.createElement('div');
        heading.className = 'book-heading';
        heading.textContent = book.title;
        block.appendChild(heading);

        const subheading = document.createElement('div');
        subheading.className = 'book-subheading';
        subheading.textContent = [book.subject, book.class, book.board]
          .filter(Boolean).join(' · ');
        block.appendChild(subheading);

        const ul = document.createElement('ul');
        ul.className = 'chapter-list';
        book.files.forEach(f => {
          const li = document.createElement('li');
          li.innerHTML =
            `Ch ${f.chapter} — ${f.chapter_name}` +
            `<span class="ch-count">${f.count} q</span>`;
          ul.appendChild(li);
        });
        block.appendChild(ul);
        display.appendChild(block);
      });
    }

    function filterShowError(msg) {
      const display = document.getElementById('index-display');
      const el = document.createElement('p');
      el.className = 'index-error';
      el.textContent = msg;
      display.appendChild(el);
    }

    async function filterPickFolder() {
      try {
        folderHandle = await window.showDirectoryPicker();
      } catch {
        return; // cancelled — no UI change
      }

      const display = document.getElementById('index-display');
      display.innerHTML = '';

      const registry = await getData('_books_registry.json');
      if (!registry) {
        filterShowError('_books_registry.json not found in selected folder');
        return;
      }

      try {
        await folderHandle.getDirectoryHandle('GithubUpload');
      } catch {
        filterShowError('GithubUpload subfolder not found');
        return;
      }

      bookData = [];
      for (const book of (registry.books || [])) {
        const index = await getData('GithubUpload/' + book.code + '/_index.json');
        if (!index) continue;
        bookData.push({
          title: book.title,
          subject: book.subject || '',
          class: book.class || '',
          board: book.board || '',
          code: book.code,
          files: index.files || []
        });
      }

      filterRenderIndex();
    }

    document.getElementById('btn-pick-folder')
      .addEventListener('click', filterPickFolder);

    // Tab switching
    const tabBtns   = document.querySelectorAll('.tab-btn');
    const tabPanels = document.querySelectorAll('.tab-panel');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        tabPanels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });
  </script>

</body>
</html>
