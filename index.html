        item.appendChild(txt);
        legend.appendChild(item);
      });
      paletteArea.appendChild(legend);

      body.appendChild(qArea);
      body.appendChild(paletteArea);
      container.appendChild(body);
      tab.appendChild(container);

      cbtRenderPalette();
      cbtRenderQuestion(cbt.current);

      // Start timer
      cbtClearTimer();
      cbt.timerInterval = setInterval(() => {
        if (!cbt) return;
        cbt.timeLeft = Math.max(0, cbt.timeLeft - 1);
        const el = document.getElementById('cbt-timer-display');
        if (el) {
          el.textContent = cbtFormatTime(cbt.timeLeft);
          if (cbt.timeLeft <= 300) el.classList.add('warning');
        }
        if (cbt.timeLeft <= 0) {
          cbtClearTimer();
          cbtShowResult();
        }
      }, 1000);
    }

    function cbtRenderPalette() {
      const grid = document.getElementById('cbt-palette-grid');
      if (!grid) return;
      grid.innerHTML = '';
      paper.questions.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.className   = 'palette-btn ' + cbtStatusClass(cbt.status[i]);
        btn.textContent = i + 1;
        if (i === cbt.current) btn.classList.add('palette-current');
        btn.addEventListener('click', () => cbtGoTo(i));
        grid.appendChild(btn);
      });
    }

    function cbtRenderQuestion(idx) {
      const area = document.getElementById('cbt-question-area');
      if (!area) return;
      area.innerHTML = '';

      const q = paper.questions[idx];
      if (!q) return;

      if (cbt.status[idx] === 'not-visited') cbt.status[idx] = 'visited';

      const ROMAN = ['i','ii','iii','iv','v','vi','vii','viii','ix','x'];
      const type  = q.type || 'mcq_single';

      // Meta row
      const meta = document.createElement('div');
      meta.className = 'cbt-q-meta';
      const numSpan = document.createElement('span');
      numSpan.className   = 'cbt-q-number';
      numSpan.textContent = `Question ${idx + 1} of ${paper.questions.length}`;
      const badge = document.createElement('span');
      badge.className   = 'select-q-badge';
      badge.textContent = type.replace(/_/g, ' ');
      meta.appendChild(numSpan);
      meta.appendChild(badge);
      area.appendChild(meta);

      // Question body by type
      if (type === 'assertion_reason') {
        const aLbl = document.createElement('div');
        aLbl.className   = 'cbt-q-label';
        aLbl.textContent = 'Assertion (A):';
        area.appendChild(aLbl);
        const aText = document.createElement('div');
        aText.className   = 'cbt-q-stem';
        aText.textContent = q.assertion || '';
        area.appendChild(aText);
        const rLbl = document.createElement('div');
        rLbl.className   = 'cbt-q-label';
        rLbl.textContent = 'Reason (R):';
        area.appendChild(rLbl);
        const rText = document.createElement('div');
        rText.className   = 'cbt-q-stem';
        rText.textContent = q.reason || '';
        area.appendChild(rText);
      } else if (type === 'match_following') {
        const table  = document.createElement('table');
        table.className = 'cbt-match-table';
        const thead  = document.createElement('thead');
        const hRow   = document.createElement('tr');
        ['List I', 'List II'].forEach(h => {
          const th = document.createElement('th');
          th.textContent = h;
          hRow.appendChild(th);
        });
        thead.appendChild(hRow);
        table.appendChild(thead);
        const tbody  = document.createElement('tbody');
        const listI  = q.list_i  || [];
        const listII = q.list_ii || [];
        const rc     = Math.max(listI.length, listII.length);
        for (let i = 0; i < rc; i++) {
          const tr  = document.createElement('tr');
          const tdI = document.createElement('td');
          tdI.textContent  = listI[i]  ? `${i + 1}. ${listI[i]}`     : '';
          const tdII = document.createElement('td');
          tdII.textContent = listII[i] ? `${ROMAN[i]}. ${listII[i]}` : '';
          tr.appendChild(tdI);
          tr.appendChild(tdII);
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        area.appendChild(table);
        const stemEl = document.createElement('div');
        stemEl.className   = 'cbt-q-stem';
        stemEl.textContent = q.stem || '';
        area.appendChild(stemEl);
      } else {
        const stemEl = document.createElement('div');
        stemEl.className   = 'cbt-q-stem';
        stemEl.textContent = q.stem || '';
        area.appendChild(stemEl);
      }

      // Options
      const isMulti = type === 'mcq_multi';
      let opts = q.options || [];
      if (type === 'assertion_reason') {
        opts = [
          { key: 'A', text: 'Both A and R are true and R is the correct explanation of A' },
          { key: 'B', text: 'Both A and R are true but R is not the correct explanation of A' },
          { key: 'C', text: 'A is true but R is false' },
          { key: 'D', text: 'A is false but R is true' }
        ];
      }

      const optionsDiv = document.createElement('div');
      optionsDiv.className = 'cbt-options';
      const currentAnswer = cbt.answers[idx];

      opts.forEach(opt => {
        const label = document.createElement('label');
        label.className = 'cbt-option';

        const input = document.createElement('input');
        input.type  = isMulti ? 'checkbox' : 'radio';
        input.name  = `cbt-q-${idx}`;
        input.value = opt.key;

        if (isMulti) {
          if (Array.isArray(currentAnswer) && currentAnswer.includes(opt.key)) {
            input.checked = true;
            label.classList.add('selected');
          }
        } else {
          if (currentAnswer === opt.key) {
            input.checked = true;
            label.classList.add('selected');
          }
        }

        input.addEventListener('change', () => {
          if (isMulti) {
            optionsDiv.querySelectorAll('.cbt-option').forEach(l => l.classList.remove('selected'));
            optionsDiv.querySelectorAll('input[type=checkbox]:checked').forEach(cb => {
              cb.closest('.cbt-option').classList.add('selected');
            });
          } else {
            optionsDiv.querySelectorAll('.cbt-option').forEach(l => l.classList.remove('selected'));
            label.classList.add('selected');
          }
        });

        const textSpan = document.createElement('span');
        textSpan.textContent = `${opt.key}. ${opt.text}`;
        label.appendChild(input);
        label.appendChild(textSpan);
        optionsDiv.appendChild(label);
      });

      area.appendChild(optionsDiv);

      // Controls
      const controls = document.createElement('div');
      controls.className = 'cbt-controls';

      const btnBack = document.createElement('button');
      btnBack.className   = 'cbt-nav-btn';
      btnBack.textContent = '← Back';
      btnBack.disabled    = idx === 0;
      btnBack.addEventListener('click', () => cbtGoTo(idx - 1));

      const btnSave = document.createElement('button');
      btnSave.className   = 'btn-primary';
      btnSave.textContent = 'Save & Next';
      btnSave.addEventListener('click', () => {
        const ans = cbtReadAnswer(idx, isMulti, optionsDiv);
        if (ans !== null) {
          cbt.answers[idx] = ans;
          if (cbt.status[idx] !== 'answered-review') cbt.status[idx] = 'answered';
        }
        if (idx + 1 < paper.questions.length) cbtGoTo(idx + 1);
      });

      const btnMark = document.createElement('button');
      btnMark.className   = 'btn-secondary';
      btnMark.textContent = 'Mark for Review';
      btnMark.addEventListener('click', () => {
        const ans = cbtReadAnswer(idx, isMulti, optionsDiv);
        if (ans !== null) {
          cbt.answers[idx] = ans;
          cbt.status[idx]  = 'answered-review';
        } else {
          cbt.status[idx] = 'review';
        }
        if (idx + 1 < paper.questions.length) cbtGoTo(idx + 1);
      });

      const btnClear = document.createElement('button');
      btnClear.className   = 'cbt-nav-btn';
      btnClear.textContent = 'Clear Response';
      btnClear.addEventListener('click', () => {
        delete cbt.answers[idx];
        cbt.status[idx] = 'visited';
        cbtRenderQuestion(idx);
        cbtRenderPalette();
      });

      const btnNext = document.createElement('button');
      btnNext.className   = 'cbt-nav-btn';
      btnNext.textContent = 'Next →';
      btnNext.disabled    = idx === paper.questions.length - 1;
      btnNext.addEventListener('click', () => cbtGoTo(idx + 1));

      controls.appendChild(btnBack);
      controls.appendChild(btnSave);
      controls.appendChild(btnMark);
      controls.appendChild(btnClear);
      controls.appendChild(btnNext);
      area.appendChild(controls);

      cbtRenderPalette();
      renderMath(area);
    }

    function cbtReadAnswer(idx, isMulti, optionsDiv) {
      if (isMulti) {
        const checked = [...optionsDiv.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
        return checked.length > 0 ? checked : null;
      }
      const checked = optionsDiv.querySelector('input[type=radio]:checked');
      return checked ? checked.value : null;
    }

    function cbtGoTo(idx) {
      if (idx < 0 || idx >= paper.questions.length) return;
      cbt.current = idx;
      cbtRenderQuestion(idx);
      cbtRenderPalette();
    }

    function cbtShowConfirm() {
      cbtClearTimer();
      const tab = document.getElementById('tab-cbt');
      tab.innerHTML = '';

      const answered    = Object.values(cbt.status).filter(s => s === 'answered' || s === 'answered-review').length;
      const notAnswered = paper.questions.length - answered;
      const review      = Object.values(cbt.status).filter(s => s === 'review'   || s === 'answered-review').length;

      const box = document.createElement('div');
      box.className = 'cbt-result';

      const title = document.createElement('div');
      title.className   = 'cbt-result-header';
      title.textContent = 'Submit Test?';
      box.appendChild(title);

      const summary = document.createElement('div');
      summary.className = 'cbt-result-summary';
      [
        { val: answered,    label: 'Answered' },
        { val: notAnswered, label: 'Not answered' },
        { val: review,      label: 'Marked for review' }
      ].forEach(({ val, label }) => {
        const card  = document.createElement('div');
        card.className  = 'cbt-result-card';
        const v = document.createElement('div');
        v.className   = 'cbt-result-card-val';
        v.textContent = val;
        const l = document.createElement('div');
        l.className   = 'cbt-result-card-label';
        l.textContent = label;
        card.appendChild(v);
        card.appendChild(l);
        summary.appendChild(card);
      });
      box.appendChild(summary);

      const btns = document.createElement('div');
      btns.style.cssText = 'display:flex;gap:0.75rem;';

      const btnCancel = document.createElement('button');
      btnCancel.className   = 'btn-secondary';
      btnCancel.textContent = 'Cancel';
      btnCancel.addEventListener('click', () => {
        cbtRenderAttempt();
        // Restore timer from remaining time (already in cbt.timeLeft)
        cbtGoTo(cbt.current);
      });

      const btnConfirm = document.createElement('button');
      btnConfirm.className   = 'btn-primary';
      btnConfirm.textContent = 'Submit';
      btnConfirm.addEventListener('click', cbtShowResult);

      btns.appendChild(btnCancel);
      btns.appendChild(btnConfirm);
      box.appendChild(btns);
      tab.appendChild(box);
    }

    function cbtShowResult() {
      cbtClearTimer();
      const tab = document.getElementById('tab-cbt');
      tab.innerHTML = '';

      const m          = paper.meta;
      const marksPerQ  = m.marksPerQ         || 1;
      const negMarking = m.negativeMarking   || false;
      const negMarks   = m.negativeMarksPerQ || 0;

      let correct = 0, incorrect = 0, unattempted = 0, totalScore = 0;

      const breakdown = paper.questions.map((q, i) => {
        const userAns = cbt.answers[i];
        const hasAns  = userAns !== null && userAns !== undefined &&
                        (Array.isArray(userAns) ? userAns.length > 0 : userAns !== '');
        if (!hasAns) {
          unattempted++;
          return { q, i, userAns: null, marks: 0, result: 'unattempted' };
        }
        const correctAns = (q.correct || '').trim();
        let isCorrect = false;
        if (Array.isArray(userAns)) {
          isCorrect = [...userAns].sort().join('') === correctAns.split('').sort().join('');
        } else {
          isCorrect = userAns === correctAns;
        }
        if (isCorrect) {
          correct++;
          totalScore += marksPerQ;
          return { q, i, userAns, marks: marksPerQ, result: 'correct' };
        } else {
          incorrect++;
          const lost = negMarking ? negMarks : 0;
          totalScore -= lost;
          return { q, i, userAns, marks: lost > 0 ? -lost : 0, result: 'incorrect' };
        }
      });

      const container = document.createElement('div');
      container.className = 'cbt-result';

      const title = document.createElement('div');
      title.className   = 'cbt-result-header';
      title.textContent = 'Result';
      container.appendChild(title);

      const summary = document.createElement('div');
      summary.className = 'cbt-result-summary';
      [
        { val: totalScore.toFixed(2), label: 'Score' },
        { val: correct,               label: 'Correct' },
        { val: incorrect,             label: 'Incorrect' },
        { val: unattempted,           label: 'Unattempted' }
      ].forEach(({ val, label }) => {
        const card = document.createElement('div');
        card.className  = 'cbt-result-card';
        const v = document.createElement('div');
        v.className   = 'cbt-result-card-val';
        v.textContent = val;
        const l = document.createElement('div');
        l.className   = 'cbt-result-card-label';
        l.textContent = label;
        card.appendChild(v);
        card.appendChild(l);
        summary.appendChild(card);
      });
      container.appendChild(summary);

      const bk = document.createElement('div');
      bk.className = 'cbt-breakdown';

      const hRow = document.createElement('div');
      hRow.className = 'cbt-breakdown-row header';
      ['#', 'Question', 'Your Answer', 'Correct', 'Marks'].forEach(h => {
        const d = document.createElement('div');
        d.textContent = h;
        hRow.appendChild(d);
      });
      bk.appendChild(hRow);

      breakdown.forEach(({ q, i, userAns, marks, result }) => {
        const row = document.createElement('div');
        row.className = 'cbt-breakdown-row';

        const numD = document.createElement('div');
        numD.textContent = i + 1;

        const stemText = (q.stem || q.assertion || '').substring(0, 55);
        const stemD = document.createElement('div');
        stemD.textContent = stemText + (stemText.length >= 55 ? '…' : '');
        stemD.style.cssText = 'font-size:0.8rem;color:var(--muted);overflow:hidden;';

        const yourD = document.createElement('div');
        yourD.textContent = Array.isArray(userAns) ? userAns.join(', ') : (userAns || '—');
        if (result === 'correct')   yourD.className = 'cbt-result-correct';
        if (result === 'incorrect') yourD.className = 'cbt-result-incorrect';

        const corrD = document.createElement('div');
        corrD.textContent = q.correct || '—';

        const marksD = document.createElement('div');
        marksD.textContent = result === 'unattempted' ? '0' : (marks > 0 ? '+' + marks : marks);
        if (marks > 0) marksD.className = 'cbt-result-correct';
        if (marks < 0) marksD.className = 'cbt-result-incorrect';

        [numD, stemD, yourD, corrD, marksD].forEach(d => row.appendChild(d));
        bk.appendChild(row);
      });
      container.appendChild(bk);

      const btnBackHist = document.createElement('button');
      btnBackHist.className   = 'btn-secondary';
      btnBackHist.textContent = 'Back to History';
      btnBackHist.addEventListener('click', () => { switchTab('history'); historyRender(); });
      container.appendChild(btnBackHist);

      tab.appendChild(container);
    }

    // ── Folder picker ───────────────────────────────────────────────────────

    function filterShowError(msg) {
      const display = document.getElementById('index-display');
      const el = document.createElement('p');
      el.className = 'index-error';
      el.textContent = msg;
      display.appendChild(el);
    }

    async function filterPickFolder() {
      try {
        folderHandle = await window.showDirectoryPicker();
      } catch {
        return;
      }

      const display = document.getElementById('index-display');
      display.innerHTML = '';
      document.getElementById('filter-panel').style.display = 'none';

      const registry = await getData('_books_registry.json');
      if (!registry) {
        filterShowError('_books_registry.json not found in selected folder');
        return;
      }

      try {
        await folderHandle.getDirectoryHandle('GithubUpload');
      } catch {
        filterShowError('GithubUpload subfolder not found');
        return;
      }

      bookData = [];
      for (const book of (registry.books || [])) {
        const index = await getData('GithubUpload/' + book.code + '/_index.json');
        if (!index) continue;
        bookData.push({
          title:   book.title,
          subject: book.subject || '',
          class:   book.class   || '',
          board:   book.board   || '',
          code:    book.code,
          files:   index.files  || []
        });
      }

      filterRenderPanel();
    }

    document.getElementById('btn-pick-folder')
      .addEventListener('click', filterPickFolder);

    // ── Tab switching ───────────────────────────────────────────────────────
    const tabBtns   = document.querySelectorAll('.tab-btn');
    const tabPanels = document.querySelectorAll('.tab-panel');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        tabPanels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'history') historyRender();
        if (btn.dataset.tab === 'cbt')     cbtRender();
        if (btn.dataset.tab !== 'cbt')     cbtClearTimer();
      });
    });

    paramInit();
  </script>

</body>
</html>
