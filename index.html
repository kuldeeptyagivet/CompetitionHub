<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompetitionHub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>

  <style>
    :root {
      --ink:     #1a1a2e;
      --paper:   #ffffff;
      --cream:   #faf7f2;
      --accent:  #4f46e5;
      --accent2: #7c3aed;
      --gold:    #d97706;
      --muted:   #6b7280;
      --border:  #e5e7eb;
      --success: #059669;
      --warn:    #dc2626;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .app-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--accent);
      padding: 1rem 0;
      white-space: nowrap;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 0;
      flex: 1;
    }

    .tab-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover {
      color: var(--ink);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Tab panels ── */
    .tab-panel {
      display: none;
      padding: 2rem 1.5rem;
    }

    .tab-panel.active {
      display: block;
    }

    .tab-panel p {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Filter tab toolbar ── */
    #btn-pick-folder {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--paper);
      border: none;
      border-radius: 6px;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #btn-pick-folder:hover { opacity: 0.85; }

    #index-display {
      margin-top: 1rem;
    }

    .index-error {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--warn);
    }

    /* ── Filter panel ── */
    #filter-panel {
      display: none;
      margin-top: 1.5rem;
    }

    .filter-count-bar {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      padding: 0.75rem 1.1rem;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .filter-count-number {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--accent);
      line-height: 1;
    }

    .filter-count-loading {
      color: var(--muted);
    }

    .filter-count-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .filter-group:last-child {
      margin-bottom: 0;
    }

    .filter-group-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .filter-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      border-left: 2px solid var(--border);
      padding-left: 0.75rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .filter-inline-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1.1rem;
    }

    .filter-checkbox-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--ink);
      cursor: pointer;
      user-select: none;
    }

    .filter-checkbox-item input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .facet-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: 0.25rem;
    }

    .filter-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    /* ── Params panel ── */
    #params-panel {
      display: none;
      margin-top: 1.5rem;
    }

    .params-section-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.75rem;
    }

    .params-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 2rem;
      align-items: flex-end;
      margin-bottom: 0.75rem;
    }

    .params-row:last-child { margin-bottom: 0; }

    .param-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .param-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
    }

    .param-input {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.35rem 0.6rem;
      width: 5.5rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .param-input:focus { border-color: var(--accent); }

    .param-max {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .param-toggle-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.35rem 0;
    }

    .param-toggle-label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--ink);
      cursor: pointer;
      user-select: none;
    }

    .param-toggle-label input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }

    .param-computed {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--ink);
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.35rem 0.6rem;
      min-width: 5.5rem;
      display: inline-block;
    }

    /* ── Generate button ── */
    #btn-generate {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--paper);
      border: none;
      border-radius: 6px;
      padding: 0.65rem 1.6rem;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 1rem;
    }
    #btn-generate:hover    { opacity: 0.85; }
    #btn-generate:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Select tab ── */
    .select-summary-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 1rem 2rem;
      padding: 1rem 1.25rem;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .select-title-wrap { flex: 1; min-width: 200px; }

    .select-title-input {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      outline: none;
      width: 100%;
      padding: 0.1rem 0;
      transition: border-color 0.15s;
    }
    .select-title-input:focus { border-bottom-color: var(--accent); }
    .select-title-input::placeholder { color: var(--muted); opacity: 0.7; }

    .select-meta-field {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .select-meta-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .select-meta-value {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--ink);
    }

    .select-question-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 0;
      margin-bottom: 1.5rem;
      counter-reset: q-counter;
    }

    .select-question-item {
      counter-increment: q-counter;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1.1rem 0.9rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
    }

    .select-question-item::before {
      content: counter(q-counter);
      position: absolute;
      left: 1rem;
      top: 0.9rem;
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--accent);
      line-height: 1;
    }

    .select-q-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .select-q-id {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .select-q-badge {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .select-q-stem {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      line-height: 1.5;
    }

    .select-q-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .select-q-tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
    }

    .select-q-tag--easy   { color: var(--success); border-color: var(--success); background: transparent; }
    .select-q-tag--medium { color: var(--gold);    border-color: var(--gold);    background: transparent; }
    .select-q-tag--hard   { color: var(--warn);    border-color: var(--warn);    background: transparent; }

    .select-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .btn-primary {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--paper);
      border: none;
      border-radius: 6px;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-secondary {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--paper);
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-secondary:hover { opacity: 0.7; }

    /* ── Auth overlay ── */
    #auth-overlay {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--ink);
      color: var(--paper);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 9999;
    }

    #auth-overlay p {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      opacity: 0.85;
    }

    #auth-overlay button {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--paper);
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
      opacity: 0.7;
    }

    #auth-overlay button:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Auth overlay (visible by default; dismiss for dev access) -->
  <div id="auth-overlay">
    <p>Access control placeholder</p>
    <button onclick="document.getElementById('auth-overlay').style.display='none'">
      Dismiss (dev only)
    </button>
  </div>

  <header>
    <span class="app-title">CompetitionHub</span>
    <nav class="tab-bar" role="tablist">
      <button class="tab-btn active" role="tab" data-tab="filter">Filter</button>
      <button class="tab-btn"        role="tab" data-tab="select">Select</button>
      <button class="tab-btn"        role="tab" data-tab="assemble">Assemble</button>
      <button class="tab-btn"        role="tab" data-tab="preview">Preview / Print</button>
    </nav>
  </header>

  <main>
    <div id="tab-filter" class="tab-panel active">

      <button id="btn-pick-folder">Select Question Bank Folder</button>
      <div id="index-display"></div>

      <div id="filter-panel">

        <div class="filter-count-bar">
          <span id="filter-count-number" class="filter-count-number">0</span>
          <span id="filter-count-label" class="filter-count-label">Select books and chapters to begin</span>
        </div>

        <div class="filter-grid">
          <div class="filter-group">
            <span class="filter-group-label">Books</span>
            <div id="filter-books-list" class="filter-list"></div>
          </div>
          <div class="filter-group">
            <span class="filter-group-label">Chapters</span>
            <div id="filter-chapters-list" class="filter-list"></div>
          </div>
        </div>

        <hr class="filter-divider">

        <div class="filter-group">
          <span class="filter-group-label">Type</span>
          <div id="filter-types-list" class="filter-inline-list"></div>
        </div>

        <div class="filter-group">
          <span class="filter-group-label">Difficulty</span>
          <div id="filter-difficulties-list" class="filter-inline-list"></div>
        </div>

        <div class="filter-group">
          <span class="filter-group-label">Bloom Level</span>
          <div id="filter-bloom-list" class="filter-inline-list"></div>
        </div>

        <div class="filter-group">
          <span class="filter-group-label">Source Type</span>
          <div id="filter-source-list" class="filter-inline-list"></div>
        </div>

      </div><!-- #filter-panel -->

      <!-- ── Test Parameters ── -->
      <div id="params-panel">
        <hr class="filter-divider">
        <div class="params-section-label">Test Parameters</div>

        <div class="params-row">
          <div class="param-group">
            <label class="param-label" for="param-q-count">Questions</label>
            <input type="number" id="param-q-count" class="param-input" min="1" value="1">
            <span id="param-q-max" class="param-max">of 0</span>
          </div>
          <div class="param-group">
            <label class="param-label" for="param-marks-per-q">Marks / question</label>
            <input type="number" id="param-marks-per-q" class="param-input" min="0.25" step="0.25" value="1">
          </div>
          <div class="param-group">
            <span class="param-label">Negative marking</span>
            <div class="param-toggle-row">
              <label class="param-toggle-label">
                <input type="checkbox" id="param-neg-toggle">
                <span>On</span>
              </label>
              <input type="number" id="param-neg-marks" class="param-input"
                     min="0.25" step="0.25" value="0.25" style="display:none">
            </div>
          </div>
        </div>

        <div class="params-row">
          <div class="param-group">
            <span class="param-label">Total marks</span>
            <span id="param-total-marks" class="param-computed">—</span>
          </div>
          <div class="param-group">
            <span class="param-label">Est. Duration</span>
            <span id="param-duration" class="param-computed">—</span>
          </div>
        </div>
        <div class="params-row">
          <button id="btn-generate" disabled>Generate Test</button>
        </div>
      </div><!-- #params-panel -->

    </div>
    <div id="tab-select" class="tab-panel"></div>
    <div id="tab-assemble" class="tab-panel"><p>Assemble tab</p></div>
    <div id="tab-preview"  class="tab-panel"><p>Preview / Print tab</p></div>
  </main>

  <script>
    const CONFIG = {
      mode: 'local',
      workerUrl: 'https://qbank.yourname.workers.dev',
      accessKey: ''
    };

    let folderHandle = null;
    let bookData = [];
    let loadedQuestions = {};

    const FILTER_TYPES       = ['mcq_single', 'mcq_multi', 'assertion_reason', 'statement_based', 'match_following'];
    const FILTER_DIFFICULTIES = ['easy', 'medium', 'hard'];
    const FILTER_BLOOM        = ['remember', 'understand', 'apply', 'analyze', 'evaluate'];
    const FILTER_SOURCE       = ['extracted', 'modified', 'created'];

    let filterState = {
      books:       new Set(),
      chapters:    new Set(),
      types:       new Set(),
      difficulties: new Set(),
      bloomLevels: new Set(),
      sourceTypes: new Set()
    };

    let paperParams = {
      questionCount:     1,
      marksPerQ:         1,
      negativeMarking:   false,
      negativeMarksPerQ: 0.25
    };

    let paper = null;

    async function getData(path) {
      if (CONFIG.mode === 'local') {
        if (!folderHandle) return null;
        try {
          const parts = path.split('/');
          let dir = folderHandle;
          for (let i = 0; i < parts.length - 1; i++) {
            dir = await dir.getDirectoryHandle(parts[i]);
          }
          const fileHandle = await dir.getFileHandle(parts[parts.length - 1]);
          const file = await fileHandle.getFile();
          const text = await file.text();
          return JSON.parse(text);
        } catch {
          return null;
        }
      } else {
        console.log('Worker not yet implemented');
        return null;
      }
    }

    // ── Filter state helpers ────────────────────────────────────────────────

    function filterInitState() {
      filterState.books        = new Set();
      filterState.chapters     = new Set();
      filterState.types        = new Set(FILTER_TYPES);
      filterState.difficulties = new Set(FILTER_DIFFICULTIES);
      filterState.bloomLevels  = new Set(FILTER_BLOOM);
      filterState.sourceTypes  = new Set(FILTER_SOURCE);
      loadedQuestions = {};
    }

    function filterUpdateCount() {
      const numEl   = document.getElementById('filter-count-number');
      const labelEl = document.getElementById('filter-count-label');

      if (filterState.chapters.size === 0) {
        numEl.textContent = '0';
        numEl.classList.remove('filter-count-loading');
        labelEl.textContent = 'Select books and chapters to begin';
        filterUpdateFacets();
        paramUpdateMax();
        return;
      }

      let count = 0;
      for (const key of Object.keys(loadedQuestions)) {
        if (!filterState.chapters.has(key)) continue;
        for (const q of loadedQuestions[key]) {
          if (
            filterState.types.has(q.type) &&
            filterState.difficulties.has(q.difficulty) &&
            filterState.bloomLevels.has(q.bloom_level) &&
            filterState.sourceTypes.has(q.source_type)
          ) count++;
        }
      }
      numEl.textContent = count;
      numEl.classList.remove('filter-count-loading');
      labelEl.textContent = 'questions matching filters';
      filterUpdateFacets();
      paramUpdateMax();
    }

    function computeFacet(group, value) {
      if (group === 'book') {
        const book = bookData.find(b => b.code === value);
        if (!book) return 0;
        let exact = 0, approx = 0;
        book.files.forEach(f => {
          const key = book.code + '::' + f.file;
          if (loadedQuestions[key]) {
            for (const q of loadedQuestions[key]) {
              if (
                filterState.types.has(q.type) &&
                filterState.difficulties.has(q.difficulty) &&
                filterState.bloomLevels.has(q.bloom_level) &&
                filterState.sourceTypes.has(q.source_type)
              ) exact++;
            }
          } else {
            approx += f.count;
          }
        });
        return approx > 0 ? '~' + (exact + approx) : exact;
      }

      if (group === 'chapter') {
        if (!loadedQuestions[value]) {
          const [bookCode, filename] = value.split('::');
          const book = bookData.find(b => b.code === bookCode);
          const file = book && book.files.find(f => f.file === filename);
          return file ? '~' + file.count : '';
        }
        let count = 0;
        for (const q of loadedQuestions[value]) {
          if (
            filterState.types.has(q.type) &&
            filterState.difficulties.has(q.difficulty) &&
            filterState.bloomLevels.has(q.bloom_level) &&
            filterState.sourceTypes.has(q.source_type)
          ) count++;
        }
        return count;
      }

      if (group === 'type') {
        let count = 0;
        for (const key of Object.keys(loadedQuestions)) {
          if (!filterState.chapters.has(key)) continue;
          for (const q of loadedQuestions[key]) {
            if (
              q.type === value &&
              filterState.difficulties.has(q.difficulty) &&
              filterState.bloomLevels.has(q.bloom_level) &&
              filterState.sourceTypes.has(q.source_type)
            ) count++;
          }
        }
        return count;
      }

      if (group === 'difficulty') {
        let count = 0;
        for (const key of Object.keys(loadedQuestions)) {
          if (!filterState.chapters.has(key)) continue;
          for (const q of loadedQuestions[key]) {
            if (
              filterState.types.has(q.type) &&
              q.difficulty === value &&
              filterState.bloomLevels.has(q.bloom_level) &&
              filterState.sourceTypes.has(q.source_type)
            ) count++;
          }
        }
        return count;
      }

      if (group === 'bloom') {
        let count = 0;
        for (const key of Object.keys(loadedQuestions)) {
          if (!filterState.chapters.has(key)) continue;
          for (const q of loadedQuestions[key]) {
            if (
              filterState.types.has(q.type) &&
              filterState.difficulties.has(q.difficulty) &&
              q.bloom_level === value &&
              filterState.sourceTypes.has(q.source_type)
            ) count++;
          }
        }
        return count;
      }

      if (group === 'source') {
        let count = 0;
        for (const key of Object.keys(loadedQuestions)) {
          if (!filterState.chapters.has(key)) continue;
          for (const q of loadedQuestions[key]) {
            if (
              filterState.types.has(q.type) &&
              filterState.difficulties.has(q.difficulty) &&
              filterState.bloomLevels.has(q.bloom_level) &&
              q.source_type === value
            ) count++;
          }
        }
        return count;
      }

      return 0;
    }

    function filterUpdateFacets() {
      document.querySelectorAll('.facet-count').forEach(span => {
        const label = span.closest('[data-group]');
        if (!label) return;
        span.textContent = computeFacet(label.dataset.group, label.dataset.value);
      });
    }

    async function filterLoadSelectedChapters() {
      const el = document.getElementById('filter-count-number');
      el.textContent = '…';
      el.classList.add('filter-count-loading');

      // Evict chapters no longer selected
      for (const key of Object.keys(loadedQuestions)) {
        if (!filterState.chapters.has(key)) delete loadedQuestions[key];
      }

      // Fetch chapters not yet loaded
      const fetches = [];
      for (const key of filterState.chapters) {
        if (loadedQuestions[key]) continue;
        const [bookCode, filename] = key.split('::');
        fetches.push(
          getData('GithubUpload/' + bookCode + '/' + filename).then(data => {
            if (Array.isArray(data))                        loadedQuestions[key] = data;
            else if (data && Array.isArray(data.questions)) loadedQuestions[key] = data.questions;
            else                                            loadedQuestions[key] = [];
          })
        );
      }
      await Promise.all(fetches);
      filterUpdateCount();
    }

    // ── Filter render functions ─────────────────────────────────────────────

    function filterRenderChapters() {
      const container = document.getElementById('filter-chapters-list');
      container.innerHTML = '';

      bookData.forEach(b => {
        if (!filterState.books.has(b.code)) return;
        b.files.forEach(f => {
          const key = b.code + '::' + f.file;
          const label = document.createElement('label');
          label.className = 'filter-checkbox-item';
          label.dataset.group = 'chapter';
          label.dataset.value = key;

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = filterState.chapters.has(key);
          cb.addEventListener('change', () => {
            if (cb.checked) filterState.chapters.add(key);
            else            filterState.chapters.delete(key);
            filterLoadSelectedChapters();
          });

          const text = bookData.length > 1
            ? `Ch ${f.chapter} — ${f.chapter_name} (${b.title})`
            : `Ch ${f.chapter} — ${f.chapter_name}`;

          const facet = document.createElement('span');
          facet.className = 'facet-count';

          label.appendChild(cb);
          label.appendChild(document.createTextNode(' ' + text));
          label.appendChild(facet);
          container.appendChild(label);
        });
      });
    }

    function filterRenderInlineGroup(containerId, values, stateSet, group) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      values.forEach(v => {
        const label = document.createElement('label');
        label.className = 'filter-checkbox-item';
        label.dataset.group = group;
        label.dataset.value = v;

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = true;
        cb.addEventListener('change', () => {
          if (cb.checked) stateSet.add(v);
          else            stateSet.delete(v);
          filterUpdateCount();
        });

        const facet = document.createElement('span');
        facet.className = 'facet-count';

        label.appendChild(cb);
        label.appendChild(document.createTextNode(' ' + v.replace(/_/g, ' ')));
        label.appendChild(facet);
        container.appendChild(label);
      });
    }

    function filterRenderPanel() {
      filterInitState();

      // Books
      const booksList = document.getElementById('filter-books-list');
      booksList.innerHTML = '';
      bookData.forEach(b => {
        const label = document.createElement('label');
        label.className = 'filter-checkbox-item';
        label.dataset.group = 'book';
        label.dataset.value = b.code;

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = filterState.books.has(b.code);
        cb.addEventListener('change', () => {
          if (cb.checked) {
            filterState.books.add(b.code);
            b.files.forEach(f => filterState.chapters.add(b.code + '::' + f.file));
          } else {
            filterState.books.delete(b.code);
            b.files.forEach(f => filterState.chapters.delete(b.code + '::' + f.file));
          }
          filterRenderChapters();
          filterLoadSelectedChapters();
        });

        const facet = document.createElement('span');
        facet.className = 'facet-count';

        label.appendChild(cb);
        label.appendChild(document.createTextNode(' ' + b.title));
        label.appendChild(facet);
        booksList.appendChild(label);
      });

      filterRenderChapters();

      filterRenderInlineGroup('filter-types-list',        FILTER_TYPES,        filterState.types,        'type');
      filterRenderInlineGroup('filter-difficulties-list', FILTER_DIFFICULTIES, filterState.difficulties, 'difficulty');
      filterRenderInlineGroup('filter-bloom-list',        FILTER_BLOOM,        filterState.bloomLevels,  'bloom');
      filterRenderInlineGroup('filter-source-list',       FILTER_SOURCE,       filterState.sourceTypes,  'source');

      document.getElementById('filter-panel').style.display = 'block';
      filterUpdateCount();
    }

    // ── Paper parameters ────────────────────────────────────────────────────

    function paramGetFilteredPool() {
      const pool = [];
      for (const key of Object.keys(loadedQuestions)) {
        if (!filterState.chapters.has(key)) continue;
        for (const q of loadedQuestions[key]) {
          if (
            filterState.types.has(q.type) &&
            filterState.difficulties.has(q.difficulty) &&
            filterState.bloomLevels.has(q.bloom_level) &&
            filterState.sourceTypes.has(q.source_type)
          ) pool.push(q);
        }
      }
      return pool;
    }

    function paramComputeDuration(pool) {
      if (pool.length === 0) return '—';
      let totalSec = 0;
      for (const q of pool) {
        totalSec += (q.avg_time_sec != null ? q.avg_time_sec : 90);
      }
      const mean   = totalSec / pool.length;
      const estSec = mean * paperParams.questionCount;
      const totalMin = Math.round(estSec / 60);
      const hr  = Math.floor(totalMin / 60);
      const min = totalMin % 60;
      if (hr === 0) return '~' + min + ' min';
      if (min === 0) return '~' + hr + ' hr';
      return '~' + hr + ' hr ' + min + ' min';
    }

    function paramUpdateDerived() {
      const pool        = paramGetFilteredPool();
      const totalMarks  = parseFloat((paperParams.questionCount * paperParams.marksPerQ).toFixed(2));
      const duration    = pool.length > 0 ? paramComputeDuration(pool) : '—';
      document.getElementById('param-total-marks').textContent = totalMarks;
      document.getElementById('param-duration').textContent    = duration;
      document.getElementById('param-q-max').textContent       = 'of ' + pool.length;
    }

    function paramUpdateMax() {
      const pool = paramGetFilteredPool();
      const max  = pool.length;
      const panel = document.getElementById('params-panel');

      if (max === 0) {
        panel.style.display = 'none';
        return;
      }

      panel.style.display = 'block';

      if (paperParams.questionCount > max) paperParams.questionCount = max;
      if (paperParams.questionCount < 1)   paperParams.questionCount = 1;

      const input = document.getElementById('param-q-count');
      input.max   = max;
      input.value = paperParams.questionCount;

      document.getElementById('btn-generate').disabled = (max === 0);

      paramUpdateDerived();
    }

    function paramInit() {
      const qCountEl  = document.getElementById('param-q-count');
      const marksEl   = document.getElementById('param-marks-per-q');
      const negToggle = document.getElementById('param-neg-toggle');
      const negMarks  = document.getElementById('param-neg-marks');

      qCountEl.addEventListener('input', () => {
        const pool = paramGetFilteredPool();
        let v = parseInt(qCountEl.value, 10);
        if (isNaN(v) || v < 1)        v = 1;
        if (v > pool.length)           v = pool.length;
        paperParams.questionCount = v;
        paramUpdateDerived();
      });
      qCountEl.addEventListener('blur', () => {
        qCountEl.value = paperParams.questionCount;
      });

      marksEl.addEventListener('input', () => {
        let v = parseFloat(marksEl.value);
        if (isNaN(v) || v < 0.25) v = 0.25;
        paperParams.marksPerQ = v;
        paramUpdateDerived();
      });
      marksEl.addEventListener('blur', () => {
        marksEl.value = paperParams.marksPerQ;
      });

      negToggle.addEventListener('change', () => {
        paperParams.negativeMarking  = negToggle.checked;
        negMarks.style.display       = negToggle.checked ? 'inline-block' : 'none';
      });

      negMarks.addEventListener('input', () => {
        let v = parseFloat(negMarks.value);
        if (isNaN(v) || v < 0.25) v = 0.25;
        paperParams.negativeMarksPerQ = v;
      });
      negMarks.addEventListener('blur', () => {
        negMarks.value = paperParams.negativeMarksPerQ;
      });

      document.getElementById('btn-generate')
        .addEventListener('click', paperGenerate);
    }

    // ── Paper generation ────────────────────────────────────────────────────

    function renderMath(el) {
      if (typeof renderMathInElement === 'function') {
        renderMathInElement(el, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$',  right: '$',  display: false },
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true }
          ],
          throwOnError: false
        });
      }
    }

    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      const btn = document.querySelector(`.tab-btn[data-tab="${name}"]`);
      if (btn) btn.classList.add('active');
      const panel = document.getElementById('tab-' + name);
      if (panel) panel.classList.add('active');
    }

    function paperGenerate() {
      const pool = paramGetFilteredPool();
      if (pool.length === 0) return;

      // Fisher-Yates shuffle on a copy
      const shuffled = [...pool];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      const selected = shuffled.slice(0, paperParams.questionCount);

      // Exact duration from selected questions
      let totalSec = 0;
      for (const q of selected) {
        totalSec += (q.avg_time_sec != null ? q.avg_time_sec : 90);
      }
      const totalMin = Math.round(totalSec / 60);
      const hr  = Math.floor(totalMin / 60);
      const min = totalMin % 60;
      const durationStr = hr === 0 ? min + ' min'
                        : min === 0 ? hr + ' hr'
                        : hr + ' hr ' + min + ' min';

      paper = {
        id:        crypto.randomUUID(),
        generated: new Date().toISOString(),
        meta: {
          title:             '',
          date:              new Date().toLocaleDateString('en-IN'),
          duration:          durationStr,
          totalMarks:        parseFloat((paperParams.questionCount * paperParams.marksPerQ).toFixed(2)),
          marksPerQ:         paperParams.marksPerQ,
          negativeMarking:   paperParams.negativeMarking,
          negativeMarksPerQ: paperParams.negativeMarksPerQ
        },
        questions: selected
      };

      selectRender();
      switchTab('select');
    }

    function selectRender() {
      const tab = document.getElementById('tab-select');
      tab.innerHTML = '';

      // ── Summary bar ──
      const bar = document.createElement('div');
      bar.className = 'select-summary-bar';

      const titleWrap = document.createElement('div');
      titleWrap.className = 'select-meta-field select-title-wrap';
      const titleInput = document.createElement('input');
      titleInput.type        = 'text';
      titleInput.className   = 'select-title-input';
      titleInput.placeholder = 'Untitled Test';
      titleInput.value       = paper.meta.title;
      titleInput.addEventListener('input', () => { paper.meta.title = titleInput.value; });
      titleWrap.appendChild(titleInput);
      bar.appendChild(titleWrap);

      [
        { label: 'Date',      value: paper.meta.date },
        { label: 'Duration',  value: paper.meta.duration },
        { label: 'Marks',     value: paper.meta.totalMarks },
        { label: 'Questions', value: paper.questions.length }
      ].forEach(({ label, value }) => {
        const f = document.createElement('div');
        f.className = 'select-meta-field';
        f.innerHTML =
          `<span class="select-meta-label">${label}</span>` +
          `<span class="select-meta-value">${value}</span>`;
        bar.appendChild(f);
      });

      tab.appendChild(bar);

      // ── Question list ──
      const ol = document.createElement('ol');
      ol.className = 'select-question-list';

      paper.questions.forEach(q => {
        const li = document.createElement('li');
        li.className = 'select-question-item';

        const header = document.createElement('div');
        header.className = 'select-q-header';

        const idSpan = document.createElement('span');
        idSpan.className   = 'select-q-id';
        idSpan.textContent = q.question_id || '';
        header.appendChild(idSpan);

        const badge = document.createElement('span');
        badge.className   = 'select-q-badge';
        badge.textContent = (q.type || '').replace(/_/g, ' ');
        header.appendChild(badge);

        li.appendChild(header);

        const stem = document.createElement('div');
        stem.className   = 'select-q-stem';
        stem.textContent = q.stem || '';
        li.appendChild(stem);

        const tags = document.createElement('div');
        tags.className = 'select-q-tags';
        if (q.difficulty) {
          const t = document.createElement('span');
          t.className   = 'select-q-tag select-q-tag--' + q.difficulty;
          t.textContent = q.difficulty;
          tags.appendChild(t);
        }
        if (q.bloom_level) {
          const t = document.createElement('span');
          t.className   = 'select-q-tag';
          t.textContent = q.bloom_level.replace(/_/g, ' ');
          tags.appendChild(t);
        }
        li.appendChild(tags);
        ol.appendChild(li);
      });

      tab.appendChild(ol);
      renderMath(ol);

      // ── Actions ──
      const actions = document.createElement('div');
      actions.className = 'select-actions';

      const btnRegen = document.createElement('button');
      btnRegen.className   = 'btn-secondary';
      btnRegen.textContent = 'Regenerate';
      btnRegen.addEventListener('click', paperGenerate);

      const btnProceed = document.createElement('button');
      btnProceed.className   = 'btn-primary';
      btnProceed.textContent = 'Proceed to Print';
      btnProceed.addEventListener('click', () => { switchTab('preview'); previewRender(); });

      actions.appendChild(btnRegen);
      actions.appendChild(btnProceed);
      tab.appendChild(actions);
    }

    function previewRender() {
      const tab = document.getElementById('tab-preview');
      renderMath(tab);
    }

    // ── Folder picker ───────────────────────────────────────────────────────

    function filterShowError(msg) {
      const display = document.getElementById('index-display');
      const el = document.createElement('p');
      el.className = 'index-error';
      el.textContent = msg;
      display.appendChild(el);
    }

    async function filterPickFolder() {
      try {
        folderHandle = await window.showDirectoryPicker();
      } catch {
        return;
      }

      const display = document.getElementById('index-display');
      display.innerHTML = '';
      document.getElementById('filter-panel').style.display = 'none';

      const registry = await getData('_books_registry.json');
      if (!registry) {
        filterShowError('_books_registry.json not found in selected folder');
        return;
      }

      try {
        await folderHandle.getDirectoryHandle('GithubUpload');
      } catch {
        filterShowError('GithubUpload subfolder not found');
        return;
      }

      bookData = [];
      for (const book of (registry.books || [])) {
        const index = await getData('GithubUpload/' + book.code + '/_index.json');
        if (!index) continue;
        bookData.push({
          title:   book.title,
          subject: book.subject || '',
          class:   book.class   || '',
          board:   book.board   || '',
          code:    book.code,
          files:   index.files  || []
        });
      }

      filterRenderPanel();
    }

    document.getElementById('btn-pick-folder')
      .addEventListener('click', filterPickFolder);

    // ── Tab switching ───────────────────────────────────────────────────────
    const tabBtns   = document.querySelectorAll('.tab-btn');
    const tabPanels = document.querySelectorAll('.tab-panel');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        tabPanels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    paramInit();
  </script>

</body>
